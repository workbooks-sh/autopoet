<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>autopoet · voice lab</title>
<style>
  * { box-sizing:border-box; margin:0; }
  body { font-family:ui-monospace,Menlo,monospace; background:#fafaf7 fixed; color:#121316; padding:28px;
    background-image:linear-gradient(rgba(18,19,22,.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(18,19,22,.045) 1px, transparent 1px);
    background-size:28px 28px; }
  h1 { font-size:19px; margin-bottom:4px; }
  h1:after { content:''; display:block; width:64px; height:3px; background:#121316; border-radius:2px; margin-top:8px; }
  .sub { color:#6a7280; font-size:12px; margin:10px 0 22px; }
  .mood { background:#fff; border:1.6px solid #121316; border-radius:14px; padding:14px 16px; margin-bottom:14px;
    display:grid; grid-template-columns:110px 170px repeat(5, 1fr) 90px; gap:12px; align-items:center; }
  .mood b { font-size:13px; text-transform:lowercase; }
  label { display:block; font-size:9.5px; color:#6a7280; margin-bottom:3px; text-transform:uppercase; letter-spacing:.05em; }
  select, input[type=text] { width:100%; font:12px ui-monospace,monospace; padding:6px 8px;
    border:1.4px solid #c9cdd4; border-radius:8px; background:#fff; color:#121316; }
  .knob input[type=range] { width:100%; accent-color:#8e7cc3; }
  .knob .val { font-size:11px; text-align:center; margin-top:2px; }
  button { font:600 12px ui-monospace,monospace; border:1.6px solid #121316; background:#fff; color:#121316;
    border-radius:999px; padding:8px 14px; cursor:pointer; }
  button:hover { background:#efe9fb; }
  button.primary { background:#121316; color:#fff; }
  button.primary:hover { background:#33363c; }
  #bar { display:flex; gap:10px; align-items:center; margin:20px 0; flex-wrap:wrap; }
  #line { flex:1; min-width:280px; font:12px ui-monospace,monospace; padding:9px 12px;
    border:1.6px solid #121316; border-radius:999px; }
  #status { font-size:12px; color:#6a7280; min-height:16px; }
  .tags { margin:14px 0 24px; display:flex; flex-wrap:wrap; gap:6px; }
  .tags span { border:1.4px dashed #8e7cc3; color:#5f4d94; border-radius:999px; padding:4px 10px;
    font-size:11px; cursor:pointer; }
  .tags span:hover { background:#efe9fb; }
</style>
</head>
<body>
<h1>voice lab</h1>
<div class="sub">chatterbox-turbo · tune each mood's style tag + sampler, hear it, save. saved presets drive the live avatar per mood.</div>

<div id="bar">
  <input id="line" value="Well, look at this plan coming together. Shall we walk through it step by step?" spellcheck="false">
  <button class="primary" id="saveall">save presets → live avatar</button>
  <span id="status"></span>
</div>

<div class="tags" id="tagrow"></div>
<div id="moods"></div>

<script>
const TOKEN = "__TOKEN__";
const TAGS = ["", "[happy]", "[sarcastic]", "[dramatic]", "[narration]", "[whispering]", "[angry]",
  "[fear]", "[surprised]", "[crying]", "[advertisement]", "[chuckle]", "[laugh]", "[sigh]",
  "[gasp]", "[groan]", "[cough]", "[sniff]", "[clear throat]", "[shush]"];
const KNOBS = [
  { id: "t", name: "temp", min: 0.05, max: 2, step: 0.05 },
  { id: "p", name: "top p", min: 0.05, max: 1, step: 0.05 },
  { id: "k", name: "top k", min: 1, max: 1000, step: 1 },
  { id: "r", name: "rep pen", min: 1, max: 2, step: 0.05 },
  { id: "m", name: "min p", min: 0, max: 0.5, step: 0.01 }
];
// the semantic moods the avatar actually uses ([mood x] cues + listener kinds)
const DEFAULTS = {
  neutral:  { tag: "",             t: 0.8,  p: 0.95, k: 1000, r: 1.2, m: 0 },
  happy:    { tag: "[happy]",      t: 0.9,  p: 0.95, k: 1000, r: 1.2, m: 0 },
  excited:  { tag: "[happy]",      t: 1.1,  p: 0.95, k: 1000, r: 1.3, m: 0 },
  serious:  { tag: "[narration]",  t: 0.5,  p: 0.9,  k: 1000, r: 1.2, m: 0 },
  worried:  { tag: "[fear]",       t: 0.7,  p: 0.95, k: 1000, r: 1.2, m: 0 },
  angry:    { tag: "[angry]",      t: 0.9,  p: 0.95, k: 1000, r: 1.25, m: 0 },
  surprised:{ tag: "[surprised]",  t: 1.0,  p: 0.95, k: 1000, r: 1.2, m: 0 },
  sad:      { tag: "[crying]",     t: 0.7,  p: 0.95, k: 1000, r: 1.15, m: 0 },
  amused:   { tag: "[sarcastic]",  t: 1.0,  p: 0.95, k: 1000, r: 1.25, m: 0 }
};
const state = structuredClone(DEFAULTS);

const tagrow = document.getElementById("tagrow");
TAGS.filter(Boolean).forEach(t => {
  const s = document.createElement("span");
  s.textContent = t;
  s.title = "insert into the test line";
  s.onclick = () => { const l = document.getElementById("line"); l.value = t + " " + l.value; };
  tagrow.appendChild(s);
});

const moodsEl = document.getElementById("moods");
for (const mood in state) {
  const row = document.createElement("div");
  row.className = "mood";
  let knobHtml = "";
  for (const kn of KNOBS) {
    knobHtml += `<div class="knob"><label>${kn.name}</label>
      <input type="range" min="${kn.min}" max="${kn.max}" step="${kn.step}"
        data-mood="${mood}" data-knob="${kn.id}" value="${state[mood][kn.id]}">
      <div class="val" id="v-${mood}-${kn.id}">${state[mood][kn.id]}</div></div>`;
  }
  row.innerHTML = `<b>${mood}</b>
    <div><label>style tag</label><select data-mood="${mood}">
      ${TAGS.map(t => `<option value="${t}" ${t === state[mood].tag ? "selected" : ""}>${t || "(none)"}</option>`).join("")}
    </select></div>
    ${knobHtml}
    <button data-play="${mood}">▶ hear</button>`;
  moodsEl.appendChild(row);
}

moodsEl.addEventListener("input", e => {
  const m = e.target.dataset.mood;
  if (!m) return;
  if (e.target.tagName === "SELECT") state[m].tag = e.target.value;
  else {
    state[m][e.target.dataset.knob] = parseFloat(e.target.value);
    document.getElementById(`v-${m}-${e.target.dataset.knob}`).textContent = e.target.value;
  }
});

let audio = null;
moodsEl.addEventListener("click", async e => {
  const m = e.target.dataset.play;
  if (!m) return;
  const s = state[m];
  const text = (s.tag ? s.tag + " " : "") + document.getElementById("line").value;
  e.target.textContent = "…";
  setStatus(`synthesizing ${m} (chatterbox, ~5s)…`);
  try {
    const q = `engine=chatterbox&temp=${s.t}&top_p=${s.p}&top_k=${s.k}&rep=${s.r}&min_p=${s.m}`;
    const r = await fetch(`/voice/tts?${q}`, { method: "POST",
      headers: { authorization: "Bearer " + TOKEN, "content-type": "text/plain" }, body: text });
    if (!r.ok) throw new Error(await r.text());
    const buf = await r.arrayBuffer();
    if (audio) audio.pause();
    audio = new Audio(URL.createObjectURL(new Blob([buf], { type: "audio/wav" })));
    audio.play();
    setStatus(`${m}: ${s.tag || "no tag"} · t=${s.t} r=${s.r}`);
  } catch (err) { setStatus("failed: " + String(err).slice(0, 80)); }
  e.target.textContent = "▶ hear";
});

document.getElementById("saveall").onclick = async () => {
  const lines = Object.entries(state).map(([m, s]) =>
    `${m} tag=${s.tag || "-"} t=${s.t} p=${s.p} k=${s.k} r=${s.r} m=${s.m}`).join("\n");
  const r = await fetch("/voice/moods/save", { method: "POST",
    headers: { authorization: "Bearer " + TOKEN, "content-type": "text/plain" }, body: lines });
  setStatus(r.ok ? "saved — the live avatar uses these now" : "save failed");
};

function setStatus(t) { document.getElementById("status").textContent = t; }

// load saved presets over the defaults
fetch("/voice/moods", { headers: { authorization: "Bearer " + TOKEN } })
  .then(r => r.text()).then(txt => {
    txt.split("\n").forEach(line => {
      const p = line.trim().split(/\s+/);
      if (p.length < 2 || !state[p[0]]) return;
      const s = state[p[0]];
      p.slice(1).forEach(kv => {
        const [k, v] = kv.split("=");
        if (k === "tag") s.tag = v === "-" ? "" : v;
        else if (k in s) s[k] = parseFloat(v);
      });
    });
    // reflect into the controls
    document.querySelectorAll("#moods select").forEach(sel => { sel.value = state[sel.dataset.mood].tag; });
    document.querySelectorAll("#moods input[type=range]").forEach(rg => {
      rg.value = state[rg.dataset.mood][rg.dataset.knob];
      document.getElementById(`v-${rg.dataset.mood}-${rg.dataset.knob}`).textContent = rg.value;
    });
  }).catch(() => {});
</script>
</body>
</html>
