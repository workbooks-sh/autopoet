    #graph-bg path.connection { stroke: var(--edge) !important; }

    #graph-bg .m-fade { animation: mfade .5s ease-out both; }
    @keyframes mfade { from { opacity: 0; } to { opacity: 1; } }

    .stagebox { position: fixed; inset: 0; display: grid; place-items: center; pointer-events: none; z-index: 1; }
    .scene {
      width: 132px; height: 132px; pointer-events: auto;

      transition: transform .8s cubic-bezier(.3, 1, .35, 1);

      transform: rotateX(calc(var(--rx, 0deg) + var(--nod, 0deg) + var(--br, 0deg)))

       (cursor tilt, nod, breath); the scene's toon outline traces them
       into the same silhouette as the body */
    .hand {
      position: absolute; left: 0; top: 0; width: 30px; height: 40px;
      pointer-events: none; opacity: var(--po, 0);
      transform-origin: 15px 20px;

    .hand.left svg { transform: scaleX(-1); }
    #ref-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 1; }

      v.setUint32(24,sr,true); v.setUint32(28,sr*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
      w(36,"data"); v.setUint32(40,len*2,true);
      var o=44; for(var i=0;i<len;i++){ var x=Math.max(-1,Math.min(1,f[i])); v.setInt16(o, x<0?x*0x8000:x*0x7FFF, true); o+=2; }
      return new Blob([buf], { type: "audio/wav" });
    }

    // ================= listener: react to what YOU say =================
    // (compact port of the VAD listener engine — enough to make the face feel
    //  like it's receiving your words emotionally before it replies)
    var LEX = {
      joy: "happy joy love great wonderful amazing win won awesome excited glad proud beautiful perfect nice cool thanks thank",
      sad: "sad lost lonely hurt broke broken fail failed sorry tired hard stuck lost stuck confused",
      anger: "angry mad annoyed unfair hate stupid broken wrong bug crash error frustrated",
      fear: "worried scared afraid nervous anxious risk dangerous unsure",
      surprise: "wow whoa really surprised unexpected huh what"
    };
    var W2E = {}; Object.keys(LEX).forEach(function (e) { LEX[e].split(" ").forEach(function (w) { W2E[w] = e; }); });
    var LISTEN_FACE = {
      joy: ["smirk", "raised"], sad: ["neutral", "worried"], anger: ["neutral", "worried"],
      fear: ["neutral", "worried"], surprise: ["surprised", "raised"], none: ["neutral", "raised"]
    };
    function reactToUser(text) {
      var sc = { joy:0, sad:0, anger:0, fear:0, surprise:0 };
      (text.toLowerCase().match(/[a-z]+/g) || []).forEach(function (w) { if (W2E[w]) sc[W2E[w]]++; });
      var dom = null, n = 0; Object.keys(sc).forEach(function (e) { if (sc[e] > n) { n = sc[e]; dom = e; } });
      var f = LISTEN_FACE[dom || "none"];
      mood = f[0]; setMouth(f[0]); setBrows(f[1]);
      if (dom === "surprise") gesture("--nod", [-6, 2, -4, 0], 130);   // small recoil
      else nod();                                                      // "mm-hm, I hear you"
    }

    // ================= idle / status =================
    var vstatus = document.getElementById("vstatus"), vstatusT = document.getElementById("vstatus-t");
    function setStatus(cls, text) { vstatus.className = "vstatus " + cls; vstatusT.textContent = text; }
    function idle() {
      graphBg.classList.remove("on");
      mood = "neutral"; setMouth("neutral"); setBrows("none");
      setStatus(kokoro ? "ready" : "", kokoro ? "ready — talk or type" : "voice: caption only");
    }

    // ================= the local speech pipeline =================
    var history = [];
    // show what YOU said in the caption, in the voice-in color
    function showYou(text) { caption.className = "caption on you"; caption.textContent = text; }
    async function ask(userText) {
      userText = (userText || "").trim(); if (!userText) return;
      showYou(userText);                            // your words, your color
      reactToUser(userText);                        // feel it before answering
      history.push({ role: "user", content: userText });
      setStatus("thinking", "thinking…");
      var ctrl = new AbortController();
      var killer = setTimeout(function () { ctrl.abort(); }, 30000);
      try {
        var res = await fetch("/voice/brain", { method: "POST", signal: ctrl.signal,
          headers: { authorization: "Bearer " + TOKEN, "content-type": "application/json" },
          body: JSON.stringify({ history: history.slice(-16) }) });
        clearTimeout(killer);
        if (!res.ok) { var e = await res.json().catch(function(){return{};});
          setStatus("", e.error || ("brain " + res.status)); mood="neutral"; setMouth("neutral"); return; }
        var data = await res.json();
        history.push({ role: "assistant", content: data.reply });
        await perform(data.reply);                  // perform() flips caption to avatar color
      } catch (err) { clearTimeout(killer); setStatus("", "brain unreachable"); mood="neutral"; setMouth("neutral"); setBrows("none"); }
    }

    // typed input
    var sayIn = document.getElementById("say"), sendBtn = document.getElementById("send");
    function submitTyped() { var t = sayIn.value.trim(); if (!t) return; sayIn.value = ""; ask(t); }
    sendBtn.addEventListener("click", submitTyped);
    sayIn.addEventListener("keydown", function (e) { if (e.key === "Enter") submitTyped(); });

    // mic + VAD + local STT
    var micBtn = document.getElementById("mic"), micVad = null, listening = false;
    async function startListening() {
      if (!window.vad) { setStatus("", "VAD unavailable"); return; }
      try {
        micVad = await vad.MicVAD.new({
          baseAssetPath: "/static/vendor/", onnxWASMBasePath: "/static/vendor/",
          onSpeechStart: function () {
            if (playing) { stopPerform(); }             // barge-in
            setBrows("raised");                          // perk up: listening
            setStatus("thinking", "listening…");
            caption.className = "caption on you";        // your line, your color
            caption.textContent = "…";                   // pending — Moonshine is listening
          },
          onSpeechEnd: async function (audio) {           // Float32 @16kHz
            setStatus("thinking", "transcribing…");
            var blob = wavFromRaw({ audio: audio, sampling_rate: 16000 });
            try {
              var r = await fetch("/voice/dictate", { method: "POST",
                headers: { authorization: "Bearer " + TOKEN, "content-type": "audio/wav" }, body: blob });
              var text = (await r.text()).trim();
              if (text) ask(text);                         // ask() re-shows your text, then flips to the reply
              else { caption.classList.remove("on"); setStatus("ready", "didn't catch that"); }
            } catch (e) { caption.classList.remove("on"); setStatus("", "STT failed"); }
          }
        });
        micVad.start(); listening = true; micBtn.classList.add("listening");
        setStatus("ready", "listening — just talk");
      } catch (e) {
        // distinguish an actual mic-permission denial from a VAD/model init failure
        var name = (e && e.name) || "";
        if (name === "NotAllowedError" || name === "SecurityError") setStatus("", "mic permission denied");
        else if (name === "NotFoundError") setStatus("", "no microphone found");
        else setStatus("", "voice engine failed: " + (name || String(e).slice(0, 60)));
        console.error("[vad] startListening failed:", e);
      }
    }
    function stopListening() {
      if (micVad) { try { micVad.pause(); } catch (e) {} }
      listening = false; micBtn.classList.remove("listening"); idle();
    }
    micBtn.addEventListener("click", function () { listening ? stopListening() : startListening(); });

    // ================= boot Kokoro in a WORKER (local TTS) =================
    // WASM inference blocks its thread; keeping it off the UI thread is what
    // stops the widget from freezing while it speaks.
    var kokoro = false, VOICE = "af_heart";
    var kWorker = null, kSeq = 0, kPending = {};
    setStatus("thinking", "loading local voice…");
    try {
      kWorker = new Worker("/static/vendor/kokoro-worker.mjs", { type: "module" });
      kWorker.onmessage = function (e) {
        var m = e.data;
        if (m.type === "ready") { kokoro = true; idle(); }
        else if (m.type === "error") { kokoro = false; idle(); }
        else if (m.type === "audio") {
          var cb = kPending[m.id]; if (!cb) return; delete kPending[m.id];
          if (m.error || !m.audio) cb(null);
          else cb({ audio: m.audio, sampling_rate: m.sr });
        }
      };
      kWorker.onerror = function () { kokoro = false; idle(); };
      kWorker.postMessage({ type: "load" });
    } catch (e) { kokoro = false; idle(); }
    // synth one sentence off-thread; resolves with {audio, sampling_rate} | null
    function kokoroGen(text) {
      return new Promise(function (resolve) {
        if (!kokoro || !kWorker) { resolve(null); return; }
        var id = ++kSeq; kPending[id] = resolve;
        kWorker.postMessage({ type: "gen", id: id, text: text, voice: VOICE });
        setTimeout(function () { if (kPending[id]) { delete kPending[id]; resolve(null); } }, 15000);
      });
    }

    moveTo(0, 0);   // rest pose — centered
  })();

</script>
</body>
</html>
