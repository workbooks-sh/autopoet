<!doctype html>
<meta charset="utf-8">
<title>autopoet</title>
<style>
  :root { --ink:#223; --paper:#fbfbf9; --grid:#e6e8ea; --line:#e3e5e8; }
  html,body { margin:0; height:100%; overflow:hidden;
    font:13px/1.5 ui-monospace,SFMono-Regular,monospace; color:var(--ink);
    background:var(--paper); }

  #app { display:grid; height:100vh;
    grid-template-columns:var(--tree-w,240px) 0px 1fr;
    grid-template-rows:1fr var(--cons-h,30px);
    transition:grid-template-columns .32s cubic-bezier(.22,.9,.24,1),
               grid-template-rows .28s cubic-bezier(.22,.9,.24,1); }
  #app.editing { grid-template-columns:var(--tree-w,240px) var(--ed-w,480px) 1fr; }
  #app.dragging { transition:none; }   /* 1:1 tracking while a handle is held */

  /* resize handles */
  .rs { position:absolute; top:0; bottom:0; right:-3px; width:6px; cursor:col-resize; z-index:8; }
  .rs:hover { background:rgba(80,120,220,.18); }
  #consgrip { position:absolute; left:0; right:0; top:-3px; height:6px; cursor:row-resize; z-index:8; }
  #consgrip:hover { background:rgba(80,120,220,.25); }

  /* ── vault tree (green in the mock) ─────────────────────────────────── */
  #tree { grid-row:1; grid-column:1; border-right:1px solid var(--line);
    background:#f7f7f4; overflow:auto; padding:40px 0 10px; position:relative; }
  #tree .hd { display:flex; align-items:center; gap:6px; padding:2px 10px 8px;
    color:#889; font-size:11px; }
  #tree .hd b { flex:1; font-weight:600; letter-spacing:.06em; }
  #tree .hd button { border:none; background:none; cursor:pointer; padding:3px;
    border-radius:6px; display:flex; align-items:center; color:#7a8290;
    transition:background .15s ease, color .15s ease; }
  #tree .hd button:hover { background:#e8e8e2; color:#3a4250; }
  #tree .hd button svg { width:15px; height:15px; }
  #tree svg.lucide { width:14px; height:14px; flex:none; }
  #tree .tw { display:flex; margin-left:-4px; transition:transform .18s ease; color:#98a0ac; }
  #tree .tw svg.lucide { width:12px; height:12px; }
  #tree .row.openf .tw { transform:rotate(90deg); }
  #tree ul.hide { display:none; }
  .ic-folder { color:#c9a04e; } .ic-note { color:#5b8cc9; } .ic-sketch { color:#a97bc0; }
  /* IDE-style dirty marker on unsaved files */
  #tree .row.isdirty::after { content:"●"; color:#f2a33c; font-size:9px; margin-left:auto; }
  #tree ul { list-style:none; margin:0; padding-left:14px; }
  #tree > ul { padding-left:6px; }
  #tree li > .row { display:flex; align-items:center; gap:6px; padding:2px 6px;
    border-radius:5px; cursor:pointer; white-space:nowrap; }
  #tree li > .row:hover { background:#ececе6; background:#ecece6; }
  #tree li > .row.open { background:#e4e8f5; }
  #tree svg.ic { width:13px; height:13px; flex:none; }

  /* ── prose / sketch editor (blue in the mock) ───────────────────────── */
  #editor { grid-row:1; grid-column:2; border-right:1px solid var(--line);
    display:none; flex-direction:column; background:#fff; min-width:0; position:relative;
    opacity:0; transform:translateX(-8px);
    transition:opacity .28s ease .1s, transform .28s cubic-bezier(.22,.9,.24,1) .1s; }
  #app.editing #editor { opacity:1; transform:none; }
  #app.editing #editor { display:flex; }
  #editor .hd { display:flex; align-items:center; gap:9px; padding:9px 14px;
    color:#3a4250; font-size:12px; border-bottom:1px solid var(--line); background:#fbfbf9; }
  #editor .hd .name { cursor:text; }
  #editor .hd .name { flex:1; overflow:hidden; text-overflow:ellipsis; }
  #editor .hd .dot { width:8px; height:8px; border-radius:50%; background:#bbb; }
  #editor .hd .dot.dirty { background:#f2c14e; }
  #editor .hd .dot.saved { background:#6aa84f; }
  #editor .hd button { font:inherit; border:none; background:none; cursor:pointer; color:#99a;
    display:flex; padding:3px; border-radius:6px; transition:background .15s ease, color .15s ease; }
  #editor .hd button:hover { background:#f0f0ec; color:#3a4250; }
  #editor .hd svg.lucide { width:14px; height:14px; }
  #prose { flex:1; border:none; outline:none; resize:none; padding:18px 20px;
    font:14px/1.7 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:#223;
    background:#fff; }
  #sketch { flex:1; touch-action:none; cursor:crosshair; background:#fff; display:none; }
  #sktools { display:none; gap:4px; padding:6px 12px; border-bottom:1px solid var(--line);
    background:#fbfbf9; }
  #sktools button { border:none; background:none; cursor:pointer; color:#7a8290;
    padding:5px 7px; border-radius:7px; display:flex; align-items:center;
    transition:background .15s ease, color .15s ease; }
  #sktools button:hover { background:#efefe9; color:#3a4250; }
  #sktools button.sel { background:#e4e8f5; color:#2f6fdd; }
  #sktools svg.lucide { width:14px; height:14px; }
  #sktext { position:absolute; z-index:9; display:none; font:16px -apple-system,sans-serif;
    border:1px solid #5b8cc9; border-radius:6px; padding:2px 8px; outline:none; background:#fff; }
  #app.sketching #prose { display:none; }
  #app.sketching #sketch { display:block; }
  #app.sketching #sktools { display:flex; }

  /* ── the world (graph) ──────────────────────────────────────────────── */
  #stage { grid-row:1; grid-column:3; position:relative; min-width:0; }
  #graph { position:absolute; inset:0; width:100%; height:100%; cursor:grab; }
  #graph:active { cursor:grabbing; }
  text.lbl { font:11px ui-monospace,monospace; fill:#556; pointer-events:none; }

  /* ── console footer: collapsed by default, designed in-theme ─────────── */
  #consolewrap { grid-row:2; grid-column:1 / -1; position:relative;
    border-top:1px solid var(--line); background:#f7f7f4; color:#556;
    display:flex; flex-direction:column; min-height:0; }
  #conshead { display:flex; align-items:center; gap:8px; padding:5px 14px;
    font-size:11px; color:#7a8290; cursor:pointer; user-select:none; flex:none;
    transition:background .15s ease; }
  #conshead:hover { background:#efefe9; }
  #conshead svg.lucide { width:13px; height:13px; }
  #conshead .chev { transition:transform .25s cubic-bezier(.22,.9,.24,1); display:flex; }
  #app.console-open #conshead .chev { transform:rotate(90deg); }
  #conshead .ttl { font-weight:600; letter-spacing:.05em; }
  #conshead .pulse { width:6px; height:6px; border-radius:50%; background:#c6ccd4;
    transition:background .2s ease, box-shadow .2s ease; }
  #conshead .pulse.live { background:#6aa84f; box-shadow:0 0 0 3px rgba(106,168,79,.18); }
  #conshead .last { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    color:#98a0ac; transition:color .3s ease; }
  #conshead .last.fresh { color:#3a4250; }
  #conshead .count { color:#b3bac4; font-size:10px; }
  #console { flex:1; overflow:auto; margin:0; padding:4px 14px 10px;
    font-size:11px; line-height:1.7; color:#556;
    opacity:0; transition:opacity .25s ease .08s; pointer-events:none; }
  #app.console-open #console { opacity:1; pointer-events:auto; }
  #console .ln { white-space:pre-wrap; word-break:break-all;
    animation:lnin .25s ease; border-left:2px solid transparent; padding-left:8px; }
  #console .ln.ok { border-left-color:#9ec99a; }
  #console .ln.warn { border-left-color:#e8cb7a; }
  #console .ln.bad { border-left-color:#dfa09a; }
  @keyframes lnin { from { opacity:0; transform:translateY(3px); } }

  /* node details panel */
  #panel { position:fixed; top:16px; right:16px; width:340px; max-height:66vh;
    overflow:auto; background:#fff; border:1px solid #ddd; border-radius:10px;
    padding:14px; box-shadow:0 6px 24px rgba(0,0,0,.08); display:none; z-index:6; }
  #panel h3 { margin:0 0 6px; font-size:13px; word-break:break-all; }
  #panel pre { white-space:pre-wrap; word-break:break-word; font-size:11px; color:#445; }
  #panel .tag { display:inline-block; padding:1px 8px; border-radius:99px;
    font-size:10px; color:#fff; margin-bottom:8px; }
  #panel button { font:inherit; padding:3px 12px; cursor:pointer; margin-right:6px;
    border-radius:6px; border:1px solid #ccc; background:#fff; }
  #panel button.ok { background:#e8f5e9; } #panel button.no { background:#fdecea; }

  /* ── new-file modal (ours, not the system prompt) ────────────────────── */
  #shade { position:fixed; inset:0; background:rgba(30,34,40,.28); z-index:20;
    display:none; opacity:0; transition:opacity .2s ease; }
  #shade.on { display:block; opacity:1; }
  #modal { position:fixed; z-index:21; top:18vh; left:50%; width:380px;
    transform:translateX(-50%) translateY(8px) scale(.98); opacity:0; display:none;
    background:#fff; border:1px solid var(--line); border-radius:12px;
    box-shadow:0 18px 48px rgba(0,0,0,.16); padding:16px;
    transition:opacity .22s ease, transform .22s cubic-bezier(.22,.9,.24,1); }
  #modal.on { display:block; opacity:1; transform:translateX(-50%) translateY(0) scale(1); }
  #modal h3 { margin:0 0 10px; font-size:12px; letter-spacing:.06em; color:#889; font-weight:600; }
  #modal .kind { display:flex; gap:10px; align-items:center; padding:9px 10px;
    border:1px solid var(--line); border-radius:9px; cursor:pointer; margin-bottom:6px;
    transition:border-color .15s ease, background .15s ease; }
  #modal .kind:hover { background:#f7f7f4; }
  #modal .kind.sel { border-color:#5b8cc9; background:#f2f6fb; }
  #modal .kind svg.lucide { width:17px; height:17px; flex:none; }
  #modal .kind .t { font-weight:600; font-size:12px; }
  #modal .kind .d { font-size:11px; color:#98a0ac;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif; }
  #modal input { width:100%; box-sizing:border-box; margin:10px 0 12px; padding:7px 10px;
    font:inherit; border:1px solid var(--line); border-radius:8px; outline:none; }
  #modal input:focus { border-color:#5b8cc9; }
  #modal .acts { display:flex; justify-content:flex-end; gap:8px; }
  #modal .acts button { font:inherit; padding:5px 14px; border-radius:8px;
    border:1px solid var(--line); background:#fff; cursor:pointer; }
  #modal .acts .go { background:#223; color:#fff; border-color:#223; }

  /* ── command / live mode: lives IN the stoplight row of column 1 only ─── */
  #modetoggle { position:absolute; top:7px; right:8px; z-index:11;  /* above the drag strip */
    display:flex; align-items:center; -webkit-app-region:no-drag; }
  #modetoggle .seg { display:flex; position:relative; border:1px solid var(--line);
    border-radius:999px; overflow:hidden; background:#fff; padding:2px; }
  /* the sliding thumb — animates between the two halves */
  #modetoggle .thumb { position:absolute; top:2px; bottom:2px; left:2px; width:calc(50% - 2px);
    background:#223; border-radius:999px;
    transition:transform .22s cubic-bezier(.3,.9,.3,1.15); }
  #modetoggle .seg.live .thumb { transform:translateX(100%); }
  #modetoggle button { position:relative; z-index:1; flex:1; justify-content:center;
    font:10px ui-monospace,monospace; border:none; background:none;
    padding:5px 10px; cursor:pointer; color:#98a0ac; display:flex; align-items:center; gap:4px;
    transition:color .2s ease; }
  #modetoggle button.sel { color:#fff; }
  #modetoggle svg.lucide { width:10px; height:10px; }
  /* command = blue, live = yellow */
  #modetoggle .thumb { background:#2f6fdd; }
  #modetoggle .seg.live .thumb { background:#f2a33c; }
  #modetoggle .seg.live button.sel { color:#223; }

  /* ── the savebar: a designed one-row pill, in-theme, centered over the
     left panel(s), with a blue SAVE button ──────────────────────────────── */
  #savebar { position:fixed; bottom:44px; z-index:12; left:120px;
    display:flex; align-items:center; gap:6px; padding:6px;
    background:#fff; color:#3a4250; border:1px solid var(--line);
    border-radius:999px; box-shadow:0 10px 32px rgba(25,35,55,.16);
    white-space:nowrap; opacity:0; pointer-events:none;
    transform:translateX(-50%) translateY(12px);
    transition:opacity .22s ease, transform .25s cubic-bezier(.22,.9,.24,1),
               left .28s cubic-bezier(.22,.9,.24,1); }
  #savebar.on { opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
  #savebar .revert { border:1px solid var(--line); background:#fff; color:#67707c;
    border-radius:999px; padding:6px 14px; font:11px ui-monospace,monospace; cursor:pointer;
    transition:background .15s ease, color .15s ease; }
  #savebar .revert:hover { background:#f2f4f7; color:#223; }
  #savebar .msg { font-size:11px; color:#67707c; }
  #savebar .golive { font:10px ui-monospace,monospace; border:none; background:none;
    color:#98a0ac; cursor:pointer; padding:2px 4px; }
  #savebar .golive:hover { color:#3a4250; }
  #savebar .save { display:flex; align-items:center; gap:7px; border:none;
    background:#2f6fdd; color:#fff; border-radius:999px; padding:6px 14px;
    font:11px ui-monospace,monospace; cursor:pointer;
    transition:background .15s ease, transform .12s ease; }
  #savebar .save:hover { background:#245cc0; }
  #savebar .save:active { transform:scale(.97); }
  #savebar .save kbd { background:rgba(255,255,255,.22); border-radius:5px;
    padding:0 6px; font:inherit; }

  /* ── app-wide context menu ───────────────────────────────────────────── */
  #ctx { position:fixed; z-index:30; min-width:180px; background:#fff;
    border:1px solid var(--line); border-radius:10px; padding:5px;
    box-shadow:0 12px 36px rgba(25,35,55,.18); display:none;
    opacity:0; transform:scale(.97); transform-origin:top left;
    transition:opacity .14s ease, transform .14s cubic-bezier(.22,.9,.24,1); }
  #ctx.on { display:block; opacity:1; transform:scale(1); }
  #ctx .it { display:flex; align-items:center; gap:9px; padding:6px 10px;
    border-radius:7px; cursor:pointer; font-size:12px; color:#3a4250; }
  #ctx .it:hover { background:#f2f4f7; }
  #ctx .it.danger { color:#c0392b; }
  #ctx .it.danger:hover { background:#fdecea; }
  #ctx .it svg.lucide { width:13px; height:13px; }
  #ctx .sep { height:1px; background:var(--line); margin:4px 8px; }

  /* ── canvas badges (top-right): search + notifications ───────────────── */
  #canvasbar { position:absolute; top:12px; right:14px; z-index:7;
    display:flex; gap:8px; }
  #canvasbar .cb { position:relative; display:flex; align-items:center; justify-content:center;
    width:32px; height:32px; border-radius:9px; background:#fff; cursor:pointer;
    border:1px solid var(--line); color:#5a6472;
    transition:background .15s ease, color .15s ease, transform .12s ease; }
  #canvasbar .cb:hover { background:#f2f4f7; color:#223; }
  #canvasbar .cb:active { transform:scale(.95); }
  #canvasbar .cb svg.lucide { width:15px; height:15px; }
  #canvasbar .cb .bdg { position:absolute; top:-5px; right:-5px; min-width:15px; height:15px;
    border-radius:99px; background:#f2a33c; color:#223; font-size:9px; font-weight:700;
    display:flex; align-items:center; justify-content:center; padding:0 3px; }
  #canvasbar .cb .tip { position:absolute; top:38px; right:0; background:#223; color:#fff;
    font-size:10px; padding:3px 9px; border-radius:6px; white-space:nowrap;
    opacity:0; pointer-events:none; transform:translateY(-3px);
    transition:opacity .15s ease .15s, transform .15s ease .15s; }
  #canvasbar .cb:hover .tip { opacity:1; transform:none; }
  #canvasbar.active .cb .tip { display:none; }   /* no tooltips under open widgets */

  /* the search badge MORPHS leftward into a bar (panache, not popup).
     Collapsed = a perfect 32px square, input fully hidden. */
  #cb-search { width:32px; overflow:hidden;
    transition:width .32s cubic-bezier(.22,.9,.24,1), background .15s ease, border-color .2s ease; }
  #cb-search input { display:none; flex:1; min-width:0; border:none; outline:none;
    background:none; font:12px ui-monospace,monospace; color:#223; padding:0; }
  #cb-search.expanded { width:264px; cursor:default; border-color:#5b8cc9;
    justify-content:flex-start; padding:0 10px; gap:8px; }
  #cb-search.expanded input { display:block; animation:fadein .18s ease .12s both; }
  #cb-search.expanded > svg.lucide { color:#5b8cc9; }
  @keyframes fadein { from { opacity:0; } }

  #searchpop { position:absolute; top:52px; right:54px; z-index:8; width:264px;
    background:#fff; border:1px solid var(--line); border-radius:11px; padding:6px;
    box-shadow:0 12px 36px rgba(25,35,55,.16); display:none;
    opacity:0; transform:translateY(-6px);
    transition:opacity .18s ease, transform .18s cubic-bezier(.22,.9,.24,1); }
  #searchpop.on { display:block; opacity:1; transform:none; }
  #searchpop .res { max-height:260px; overflow:auto; margin-top:6px; }
  #searchpop .res .it { display:flex; align-items:center; gap:8px; padding:5px 9px;
    border-radius:7px; cursor:pointer; font-size:12px; }
  #searchpop .res .it:hover { background:#f2f4f7; }
  #searchpop .res .sw { width:9px; height:9px; border-radius:50%; flex:none; }

  #notif { position:absolute; top:52px; right:14px; bottom:14px; z-index:8; width:320px;
    background:#fff; border:1px solid var(--line); border-radius:12px;
    box-shadow:0 14px 40px rgba(25,35,55,.16); display:none; flex-direction:column;
    opacity:0; transform:translateX(10px);
    transition:opacity .2s ease, transform .22s cubic-bezier(.22,.9,.24,1); }
  #notif.on { display:flex; opacity:1; transform:none; }
  #notif .nh { padding:11px 14px; font-size:11px; font-weight:600; letter-spacing:.05em;
    color:#889; border-bottom:1px solid var(--line); }
  #notif .body { flex:1; overflow:auto; padding:8px; }
  #notif .card { border:1px solid var(--line); border-radius:10px; padding:10px 12px;
    margin-bottom:8px; }
  #notif .card .t { font-size:12px; font-weight:600; margin-bottom:3px; }
  #notif .card .d { font-size:11px; color:#8a93a0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif; margin-bottom:8px; }
  #notif .card button { font:10px ui-monospace,monospace; border:1px solid var(--line);
    background:#fff; border-radius:6px; padding:3px 10px; cursor:pointer; margin-right:6px; }
  #notif .card button.ok { background:#e8f5e9; }
  #notif .card button.no { background:#fdecea; }
  #notif .ev { font-size:10px; color:#98a0ac; padding:3px 6px; }

  /* tree drag-drop */
  #tree li > .row.dragover { background:#e4e8f5; outline:1px dashed #5b8cc9; }

  /* custom chrome (frameless mode) */
  #chrome { position:fixed; top:0; left:0; width:240px; height:32px; z-index:9;
    display:__CHROME__; align-items:center; gap:8px; padding-left:13px;
    -webkit-app-region:drag; }
  .tl { width:12px; height:12px; border-radius:50%; cursor:pointer; -webkit-app-region:no-drag; }
  .tl.close { background:#ff5f57; } .tl.min { background:#febc2e; } .tl.max { background:#28c840; }
</style>

<div id="chrome">
  <span class="tl close" title="close"></span>
  <span class="tl min" title="minimize"></span>
  <span class="tl max" title="zoom"></span>
</div>

<div id="app">
  <div id="tree">
    <div class="rs" id="treers"></div>
    <div id="modetoggle"><div class="seg" id="modeseg">
      <div class="thumb"></div>
      <button id="mode-command" title="changes wait for ⌘S"><i data-lucide="command"></i>cmd</button>
      <button id="mode-live" title="changes translate as you type"><i data-lucide="zap"></i>live</button>
    </div></div>
    <div class="hd"><b>VAULT</b>
      <button id="newnote" title="new document"><i data-lucide="file-plus-2"></i></button>
      <button id="newsketch" title="new sketch"><i data-lucide="pen-tool"></i></button>
      <button id="newfolder" title="new folder"><i data-lucide="folder-plus"></i></button>
    </div>
    <ul id="treeroot"></ul>
  </div>

  <div id="editor">
    <div class="rs" id="edrs"></div>
    <div class="hd">
      <span class="dot" id="savedot"></span>
      <span class="name" id="fname"></span>
      <button id="closeed" title="collapse"><i data-lucide="chevrons-left"></i></button>
    </div>
    <textarea id="prose" spellcheck="false" placeholder="write plainly — this is your source of truth"></textarea>
    <div id="sktools">
      <button data-tool="pen" class="sel" title="draw"><i data-lucide="pen-line"></i></button>
      <button data-tool="rect" title="box"><i data-lucide="square"></i></button>
      <button data-tool="ellipse" title="circle"><i data-lucide="circle"></i></button>
      <button data-tool="arrow" title="arrow"><i data-lucide="move-up-right"></i></button>
      <button data-tool="text" title="text"><i data-lucide="type"></i></button>
    </div>
    <svg id="sketch" xmlns="http://www.w3.org/2000/svg"></svg>
    <input id="sktext" spellcheck="false">
  </div>

  <div id="stage">
    <svg id="graph"></svg>
    <div id="canvasbar">
      <div class="cb" id="cb-search"><i data-lucide="search"></i><input id="searchin"
        placeholder="search the world…" spellcheck="false"><span class="tip">search the world</span></div>
      <div class="cb" id="cb-bell"><i data-lucide="bell"></i><span class="bdg" id="bellbdg" style="display:none"></span><span class="tip">notifications</span></div>
    </div>
    <div id="searchpop"><div class="res" id="searchres"></div></div>
    <div id="notif">
      <div class="nh">NOTIFICATIONS</div>
      <div class="body" id="notifbody"></div>
    </div>
  </div>
  <div id="consolewrap">
    <div id="consgrip"></div>
    <div id="conshead">
      <span class="chev"><i data-lucide="chevron-right"></i></span>
      <i data-lucide="terminal"></i>
      <span class="ttl">console</span>
      <span class="pulse" id="conspulse"></span>
      <span class="last" id="conslast"></span>
      <span class="count" id="conscount"></span>
    </div>
    <div id="console"></div>
  </div>
</div>

<div id="panel"></div>
<div id="ctx"></div>

<div id="savebar">
  <button class="revert" id="dorevert">revert</button>
  <button class="save" id="dosave">save <kbd>⌘S</kbd></button>
</div>

<div id="shade"></div>
<div id="modal">
  <h3>NEW IN VAULT</h3>
  <div class="kind" data-kind="note">
    <span class="ic-note"><i data-lucide="file-text"></i></span>
    <div><div class="t">document</div>
      <div class="d">plain language — your thoughts become real structure on save</div></div>
  </div>
  <div class="kind" data-kind="sketch">
    <span class="ic-sketch"><i data-lucide="pen-tool"></i></span>
    <div><div class="t">sketch</div>
      <div class="d">freehand drawing — the autopoet interprets what you draw</div></div>
  </div>
  <div class="kind" data-kind="folder">
    <span class="ic-folder"><i data-lucide="folder"></i></span>
    <div><div class="t">folder</div>
      <div class="d">you can put shit in it</div></div>
  </div>
  <input id="modalname" placeholder="name (nest with /)" spellcheck="false">
  <div class="acts">
    <button id="modalcancel">cancel</button>
    <button class="go" id="modalgo">create</button>
  </div>
</div>

<script src="/static/d3.v7.min.js"></script>
<script src="/static/lucide.min.js"></script>
<script>
const TOKEN = "__TOKEN__";
const authed = { headers: { authorization: `Bearer ${TOKEN}` } };

// ── window chrome ─────────────────────────────────────────────────────────
function win(a) { fetch("/win/" + a, { method: "POST", ...authed }); }
document.querySelector("#chrome .close")?.addEventListener("click", () => win("close"));
document.querySelector("#chrome .min")?.addEventListener("click", () => win("minimize"));
document.querySelector("#chrome .max")?.addEventListener("click", () => win("maximize"));

// ── error surfacing (no devtools in the webview) ─────────────────────────
function fatal(msg) {
  let b = document.getElementById("err");
  if (!b) { b = document.createElement("pre"); b.id = "err";
    b.style = "position:fixed;top:8px;right:8px;z-index:99;background:#fdecea;color:#a00;padding:8px;border-radius:6px;max-width:60vw;white-space:pre-wrap";
    document.body.appendChild(b); }
  b.textContent = "error: " + msg;
}
addEventListener("error", e => fatal(e.message + " @ " + e.filename + ":" + e.lineno));
addEventListener("unhandledrejection", e => fatal(String(e.reason)));

// ══ VAULT ═══════════════════════════════════════════════════════════════
const ICONS = {
  folder: `<span class="ic-folder"><i data-lucide="folder"></i></span>`,
  note:   `<span class="ic-note"><i data-lucide="file-text"></i></span>`,
  sketch: `<span class="ic-sketch"><i data-lucide="pen-tool"></i></span>`
};
const refreshIcons = () => window.lucide && lucide.createIcons();
let open = { path: null, kind: null, dirty: false };

async function loadTree() {
  const tree = await (await fetch("/notes/tree.json")).json();
  document.getElementById("treeroot").innerHTML = renderTree(tree);
  document.querySelectorAll("#tree .row[data-path]").forEach(el => {
    const path = el.dataset.path, kind = el.dataset.kind, folder = el.dataset.folder !== undefined;
    if (!folder) el.onclick = () => openFile(path, kind);
    if (folder) el.onclick = () => {
      if (closedFolders.has(path)) closedFolders.delete(path); else closedFolders.add(path);
      persistFolders();
      el.classList.toggle("openf");
      el.parentElement.querySelector("ul")?.classList.toggle("hide");
    };
    if (path === open.path) el.classList.add("open");
    el.classList.toggle("isdirty", !!buffers[path]);
    el.addEventListener("dblclick", () => renameNote(path, kind));
    el.addEventListener("contextmenu", e => {
      e.preventDefault();
      const items = [];
      if (!folder) items.push({ icon: "external-link", label: "open", fn: () => openFile(path, kind) });
      if (folder) items.push(
        { icon: "file-plus-2", label: "new document inside", fn: () => openModalPrefixed("note", path + "/") },
        { icon: "pen-tool", label: "new sketch inside", fn: () => openModalPrefixed("sketch", path + "/") });
      items.push({ icon: "pencil", label: "rename", fn: () => renameNote(path, kind) }, "-",
        { icon: "trash-2", label: "delete", danger: true, fn: () => deleteNote(path) });
      showCtx(e.clientX, e.clientY, items);
    });
  });
  bindTreeDnD();
  refreshIcons();
}

// tree background: create things
document.getElementById("tree").addEventListener("contextmenu", e => {
  if (e.target.closest(".row")) return;
  e.preventDefault();
  showCtx(e.clientX, e.clientY, [
    { icon: "file-plus-2", label: "new document", fn: () => openModal("note") },
    { icon: "pen-tool", label: "new sketch", fn: () => openModal("sketch") },
    { icon: "folder-plus", label: "new folder", fn: () => openModal("folder") }
  ]);
});
// folders remember their open/closed state (default open); closed set persists
let closedFolders = new Set();
try { closedFolders = new Set(JSON.parse(localStorage.getItem("ap-closed") || "[]")); } catch (_) {}
const persistFolders = () => localStorage.setItem("ap-closed", JSON.stringify([...closedFolders]));

function renderTree(items) {
  return items.map(n => {
    if (n.type === "folder") {
      const closed = closedFolders.has(n.path);
      return `<li><div class="row ${closed ? "" : "openf"}" data-path="${esc(n.path)}" data-folder>
        <span class="tw"><i data-lucide="chevron-right"></i></span>
        ${ICONS.folder}<span>${esc(n.name)}</span></div>
        <ul class="${closed ? "hide" : ""}">${renderTree(n.children || [])}</ul></li>`;
    }
    return `<li><div class="row" data-path="${esc(n.path)}" data-kind="${n.type}">${ICONS[n.type]}<span>${esc(n.name)}</span></div></li>`;
  }).join("");
}
const esc = s => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;");

// ── GLOBAL DIRTY REGISTRY (IDE-grade) ─────────────────────────────────────
// Every unsaved buffer lives here, keyed by path — any number of files can be
// dirty at once. Saving happens ONLY by ⌘S/button (command mode) or debounce
// (live mode). Never on panel close, file switch, or app exit: buffers persist
// to localStorage (hot exit) and are restored on load.
let buffers = {};
try { buffers = JSON.parse(localStorage.getItem("ap-buffers") || "{}"); } catch (_) {}
const dirtyCount = () => Object.keys(buffers).length;
const persistBuffers = () => localStorage.setItem("ap-buffers", JSON.stringify(buffers));

function markDirty(path, kind, content) {
  const first = !buffers[path];
  buffers[path] = { content, kind };
  persistBuffers();
  if (first) updateDirtyUI(); else updatePill();
  if (open.path === path) setDot("dirty");
}
function clearDirty(path) {
  delete buffers[path];
  persistBuffers();
  updateDirtyUI();
  if (open.path === path) setDot("saved");
}
async function saveOne(path) {
  const b = buffers[path];
  if (!b) return;
  await fetch("/notes/save?path=" + encodeURIComponent(path), { method: "POST", body: b.content, ...authed });
  clearDirty(path);
}
async function saveAll() {
  for (const path of Object.keys(buffers)) await saveOne(path);
}
function updateDirtyUI() {
  document.querySelectorAll("#tree .row[data-path]").forEach(el =>
    el.classList.toggle("isdirty", !!buffers[el.dataset.path]));
  updatePill();
}
function updatePill() {
  showSavebar(dirtyCount() > 0);
}

async function openFile(path, kind) {
  // never commits anything: the previous file's buffer stays in the registry
  const buffered = buffers[path];
  const content = buffered ? buffered.content
    : await (await fetch("/notes/file?path=" + encodeURIComponent(path))).text();
  open = { path, kind };
  document.getElementById("fname").textContent = path;
  document.getElementById("app").classList.add("editing");
  document.getElementById("app").classList.toggle("sketching", kind === "sketch");
  if (kind === "sketch") loadSketch(content);
  else document.getElementById("prose").value = content;
  setDot(buffered ? "dirty" : "saved");
  loadTree();
  relayout();
}
document.getElementById("closeed").onclick = () => {
  // closing NEVER saves — buffers live in the registry regardless of mode
  document.getElementById("app").classList.remove("editing", "sketching");
  open = { path: null, kind: null };
  loadTree();
  relayout();
  positionSavebar();
};

// ── command / live save modes ─────────────────────────────────────────────
// command (default): edits wait; the savebar floats up; ⌘S saves & translates.
// live: edits autosave (debounced) straight into the translation lane.
let mode = localStorage.getItem("ap-mode") || "command";
function setMode(m) {
  mode = m; localStorage.setItem("ap-mode", m);
  document.getElementById("mode-command").classList.toggle("sel", m === "command");
  document.getElementById("mode-live").classList.toggle("sel", m === "live");
  document.getElementById("modeseg").classList.toggle("live", m === "live");
  if (m === "live") saveAll();   // entering live flushes the backlog by definition
}
document.getElementById("mode-command").onclick = () => setMode("command");
document.getElementById("mode-live").onclick = () => setMode("live");
document.getElementById("dosave").onclick = () => saveAll();
document.getElementById("dorevert").onclick = () => revertAll();

// revert: drop every unsaved buffer, restore the on-disk content of the open file
async function revertAll() {
  const wasOpen = open.path && buffers[open.path];
  buffers = {}; persistBuffers();
  if (wasOpen) {
    const content = await (await fetch("/notes/file?path=" + encodeURIComponent(open.path))).text();
    if (open.kind === "sketch") loadSketch(content); else document.getElementById("prose").value = content;
  }
  clearTimeout(saveTimer); saveTimer = null;
  updateDirtyUI(); setDot("saved");
}

// center the pill over the OPEN left region (tree alone, or tree+editor)
function positionSavebar() {
  const bar = document.getElementById("savebar");
  const editing = document.getElementById("app").classList.contains("editing");
  const tree = document.getElementById("tree").offsetWidth;
  const ed = editing ? document.getElementById("editor").offsetWidth : 0;
  bar.style.left = (tree + ed) / 2 + "px";
}
function showSavebar(on) {
  positionSavebar();
  document.getElementById("savebar").classList.toggle("on", on);
}
addEventListener("resize", positionSavebar);
document.getElementById("app").addEventListener("transitionend", ev => {
  if (ev.propertyName.startsWith("grid-template")) positionSavebar();
});

addEventListener("keydown", e => {
  if ((e.metaKey || e.ctrlKey) && e.key === "s") {
    e.preventDefault();
    saveAll();
  }
});

let saveTimer = null;
function setDot(cls) { document.getElementById("savedot").className = "dot " + cls; }
// an edit only updates the registry; LIVE mode additionally debounces a save of
// that one file. Nothing else ever writes.
function onEdit() {
  if (!open.path) return;
  const content = open.kind === "sketch" ? serializeSketch() : document.getElementById("prose").value;
  markDirty(open.path, open.kind, content);
  if (mode === "live") {
    clearTimeout(saveTimer);
    const p = open.path;
    saveTimer = setTimeout(() => saveOne(p), 900);
  }
}
document.getElementById("prose").addEventListener("input", onEdit);

// ── the modal (ours, in-theme — never the system prompt). The new-file body is
// the default; askRename swaps in a raw body and restores after. ──────────────
const NEWFILE_HTML = document.getElementById("modal").innerHTML;
let modalKind = "note", modalPrefix = "";

function openModalRaw(html) {
  document.getElementById("modal").innerHTML = html;
  document.getElementById("shade").classList.add("on");
  document.getElementById("modal").classList.add("on");
  refreshIcons();
}
function closeModal() {
  document.getElementById("shade").classList.remove("on");
  document.getElementById("modal").classList.remove("on");
  setTimeout(() => { document.getElementById("modal").innerHTML = NEWFILE_HTML; bindNewFileModal(); refreshIcons(); }, 220);
}
document.getElementById("shade").onclick = () => closeModal();

function openModal(kind) { openModalPrefixed(kind, ""); }
function openModalPrefixed(kind, prefix) {
  modalKind = kind; modalPrefix = prefix;
  openModalRaw(NEWFILE_HTML);
  bindNewFileModal();
  document.querySelectorAll("#modal .kind").forEach(el =>
    el.classList.toggle("sel", el.dataset.kind === kind));
  const inp = document.getElementById("modalname");
  inp.placeholder = prefix ? `name (inside ${prefix})` : "name (nest with /)";
  inp.value = ""; setTimeout(() => inp.focus(), 60);
}
function bindNewFileModal() {
  document.querySelectorAll("#modal .kind").forEach(el =>
    el.onclick = () => {
      modalKind = el.dataset.kind;
      document.querySelectorAll("#modal .kind").forEach(k =>
        k.classList.toggle("sel", k === el));
    });
  const cancel = document.getElementById("modalcancel");
  if (cancel) cancel.onclick = () => closeModal();
  const go = document.getElementById("modalgo");
  if (go) go.onclick = createFromModal;
  const inp = document.getElementById("modalname");
  if (inp) inp.onkeydown = e => {
    if (e.key === "Enter") createFromModal();
    if (e.key === "Escape") closeModal();
  };
}
function createFromModal() {
  const name = document.getElementById("modalname").value.trim();
  if (!name) return;
  const full = modalPrefix + name;
  const path = modalKind === "sketch" ? (full.endsWith(".sketch.svg") ? full : full + ".sketch.svg")
             : full;   // documents: any name, extension optional (no ext = document)
  fetch(`/notes/new?path=${encodeURIComponent(path)}&kind=${modalKind}`, { method: "POST", ...authed })
    .then(() => loadTree())
    .then(() => { closeModal(); if (modalKind !== "folder") openFile(path, modalKind); });
}
bindNewFileModal();
document.getElementById("newnote").onclick = () => openModal("note");
document.getElementById("newsketch").onclick = () => openModal("sketch");
document.getElementById("newfolder").onclick = () => openModal("folder");

// ── sketch surface: pen / box / circle / arrow / text ─────────────────────
const sk = document.getElementById("sketch");
const SVGNS = "http://www.w3.org/2000/svg";
let tool = "pen", drawing = null, anchor = null;

document.querySelectorAll("#sktools button").forEach(b =>
  b.onclick = () => {
    tool = b.dataset.tool;
    document.querySelectorAll("#sktools button").forEach(x => x.classList.toggle("sel", x === b));
  });

function loadSketch(svgText) {
  const doc = new DOMParser().parseFromString(svgText, "image/svg+xml");
  sk.setAttribute("viewBox", doc.documentElement.getAttribute("viewBox") || "0 0 1200 800");
  sk.innerHTML = doc.documentElement.innerHTML;
  ensureArrowMarker();
}
function ensureArrowMarker() {
  if (sk.querySelector("#arrhead")) return;
  const defs = document.createElementNS(SVGNS, "defs");
  defs.innerHTML = `<marker id="arrhead" viewBox="0 0 10 10" refX="8" refY="5"
    markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#223"/></marker>`;
  sk.prepend(defs);
}
function serializeSketch() {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${sk.getAttribute("viewBox")}" fill="none">\n${sk.innerHTML}\n</svg>`;
}
function skPt(e) {
  return new DOMPoint(e.clientX, e.clientY).matrixTransform(sk.getScreenCTM().inverse());
}
const stroke = el => {
  el.setAttribute("stroke", "#223"); el.setAttribute("stroke-width", "2.5");
  el.setAttribute("stroke-linecap", "round"); el.setAttribute("fill", "none");
  return el;
};

sk.addEventListener("pointerdown", e => {
  if (tool === "text") return placeText(e);
  sk.setPointerCapture(e.pointerId);
  const p = skPt(e); anchor = p;
  ensureArrowMarker();
  if (tool === "pen") {
    drawing = stroke(document.createElementNS(SVGNS, "path"));
    drawing.setAttribute("d", `M ${p.x.toFixed(1)} ${p.y.toFixed(1)}`);
  } else if (tool === "rect") {
    drawing = stroke(document.createElementNS(SVGNS, "rect"));
    drawing.setAttribute("rx", 6);
  } else if (tool === "ellipse") {
    drawing = stroke(document.createElementNS(SVGNS, "ellipse"));
  } else if (tool === "arrow") {
    drawing = stroke(document.createElementNS(SVGNS, "line"));
    drawing.setAttribute("x1", p.x); drawing.setAttribute("y1", p.y);
    drawing.setAttribute("marker-end", "url(#arrhead)");
  }
  if (drawing) sk.appendChild(drawing);
});
sk.addEventListener("pointermove", e => {
  if (!drawing) return;
  const p = skPt(e);
  if (tool === "pen") drawing.setAttribute("d", drawing.getAttribute("d") + ` L ${p.x.toFixed(1)} ${p.y.toFixed(1)}`);
  else if (tool === "rect") {
    drawing.setAttribute("x", Math.min(anchor.x, p.x)); drawing.setAttribute("y", Math.min(anchor.y, p.y));
    drawing.setAttribute("width", Math.abs(p.x - anchor.x)); drawing.setAttribute("height", Math.abs(p.y - anchor.y));
  } else if (tool === "ellipse") {
    drawing.setAttribute("cx", (anchor.x + p.x) / 2); drawing.setAttribute("cy", (anchor.y + p.y) / 2);
    drawing.setAttribute("rx", Math.abs(p.x - anchor.x) / 2); drawing.setAttribute("ry", Math.abs(p.y - anchor.y) / 2);
  } else if (tool === "arrow") {
    drawing.setAttribute("x2", p.x); drawing.setAttribute("y2", p.y);
  }
});
addEventListener("pointerup", () => {
  if (!drawing) return;
  // discard accidental dots (shapes with no size)
  const tiny = (tool === "rect" && +drawing.getAttribute("width") < 3) ||
               (tool === "ellipse" && +drawing.getAttribute("rx") < 2);
  if (tiny) drawing.remove(); else onEdit();
  drawing = null;
});

// text tool: click places an in-place input; Enter commits an SVG <text>
const sktext = document.getElementById("sktext");
let textAt = null;
function placeText(e) {
  textAt = skPt(e);
  sktext.style.display = "block";
  sktext.style.left = (e.clientX - document.getElementById("editor").getBoundingClientRect().left) + "px";
  sktext.style.top = (e.clientY - document.getElementById("editor").getBoundingClientRect().top) + "px";
  sktext.value = "";
  setTimeout(() => sktext.focus(), 30);
}
sktext.addEventListener("keydown", e => {
  if (e.key === "Enter" && sktext.value.trim()) {
    const t = document.createElementNS(SVGNS, "text");
    t.setAttribute("x", textAt.x); t.setAttribute("y", textAt.y);
    t.setAttribute("fill", "#223");
    t.setAttribute("font-family", "-apple-system, sans-serif");
    t.setAttribute("font-size", "20");
    t.textContent = sktext.value.trim();
    sk.appendChild(t);
    sktext.style.display = "none";
    onEdit();
  }
  if (e.key === "Escape") sktext.style.display = "none";
});
sktext.addEventListener("blur", () => sktext.style.display = "none");

// ══ THE WORLD (graph) ═══════════════════════════════════════════════════
const COLORS = {
  self: "#223", doc: "#4a90d9", guide: "#8e7cc3", limb: "#e07a5f", request: "#d96ba0",
  proposal: { pending:"#f2c14e", accepted:"#6aa84f", rejected:"#cc4125",
              "rejected-by-gate":"#a61c00", reverted:"#999" }
};
const color = n => n.type === "proposal" ? (COLORS.proposal[n.status] || "#f2c14e") : (COLORS[n.type] || "#888");
const radius = n => n.type === "self" ? 46 : (n.type === "doc" ? 16 : 13);

const svg = d3.select("#graph"), g = svg.append("g");
const zoomB = d3.zoom().scaleExtent([0.25, 3]).on("zoom", e => g.attr("transform", e.transform));
svg.call(zoomB);
let worldData = { nodes: [], links: [] };

// infinite Figma-style sheet: the paper is geometry in world space
const defs = svg.append("defs");
defs.append("pattern").attr("id", "grid-minor").attr("width", 24).attr("height", 24).attr("patternUnits", "userSpaceOnUse")
  .append("path").attr("d", "M 24 0 H 0 V 24").attr("fill", "none").attr("stroke", "var(--grid)").attr("stroke-width", 1);
defs.append("pattern").attr("id", "grid-major").attr("width", 120).attr("height", 120).attr("patternUnits", "userSpaceOnUse")
  .append("path").attr("d", "M 120 0 H 0 V 120").attr("fill", "none").attr("stroke", "#d8dce0").attr("stroke-width", 1.2);
const SHEET = 100000;
function paper(sel) {
  for (const id of ["grid-minor", "grid-major"])
    sel.append("rect").attr("x", -SHEET/2).attr("y", -SHEET/2).attr("width", SHEET).attr("height", SHEET)
       .attr("fill", `url(#${id})`).attr("pointer-events", "none");
}

// ── the face ──────────────────────────────────────────────────────────────
let MOUTHS = {};
fetch("/avatar/mouths.json").then(r => r.json()).then(m => MOUTHS = m);
function setMouth(mood) {
  const g = document.getElementById("ap-mouth");
  if (g && MOUTHS[mood]) g.innerHTML = MOUTHS[mood];
}
function blinkOnce() {
  const eyes = document.getElementById("ap-eyes");
  if (!eyes) return;
  eyes.style.transform = "scaleY(0.08)";
  setTimeout(() => { eyes.style.transform = "scaleY(1)"; }, 95);
}
let faceStarted = false;
function startFace() {
  if (faceStarted) return; faceStarted = true;
  (function loop() {
    blinkOnce();
    if (Math.random() < 0.25) setTimeout(blinkOnce, 220);
    setTimeout(loop, 3000 + Math.random() * 3000);
  })();
}
let parallaxOn = false;
function startParallax() {
  if (parallaxOn) return; parallaxOn = true;
  let tx = 0, ty = 0, want = { x: 0, y: 0 }, raf = null;
  function onMove(e) {
    const av = document.getElementById("ap-svg");
    if (!av) return;
    const r = av.getBoundingClientRect();
    if (!r.width) return;
    want = {
      x: Math.max(-1, Math.min(1, (e.clientX - (r.left + r.width / 2)) / (r.width * 0.9))),
      y: Math.max(-1, Math.min(1, (e.clientY - (r.top + r.height / 2)) / (r.height * 0.9)))
    };
    if (!raf) raf = requestAnimationFrame(apply);
  }
  function apply() {
    raf = null;
    const face = document.getElementById("ap-face"), eyesPx = document.getElementById("ap-eyes-px");
    if (!face || !eyesPx) return;
    tx += (want.x - tx) * 0.35; ty += (want.y - ty) * 0.35;
    face.setAttribute("transform",
      `translate(${(tx * 2.2).toFixed(2)} ${(ty * 2.2).toFixed(2)}) skewX(${(-tx * 1.8).toFixed(2)}) skewY(${(ty * 1.0).toFixed(2)})`);
    eyesPx.setAttribute("transform", `translate(${(tx * 0.8).toFixed(2)} ${(ty * 0.8).toFixed(2)})`);
    if (Math.abs(want.x - tx) > 0.005 || Math.abs(want.y - ty) > 0.005) raf = requestAnimationFrame(apply);
  }
  addEventListener("mousemove", onMove, { passive: true });
}

let sim;
async function draw() {
  const stage = document.getElementById("stage");
  const W = stage.clientWidth, H = stage.clientHeight;
  svg.attr("width", W).attr("height", H);
  let data;
  try { data = await (await fetch("/graph.json")).json(); }
  catch (err) { return fatal("graph.json fetch failed: " + err); }
  if (!data.nodes || !data.nodes.length) return fatal("graph.json returned no nodes");
  worldData = data;
  renderNotifications();
  g.selectAll("*").remove();
  paper(g);

  sim = d3.forceSimulation(data.nodes)
    .force("link", d3.forceLink(data.links).id(d => d.id)
      .distance(l => l.kind === "ref" ? 90 : 150).strength(l => l.kind === "ref" ? 0.5 : 0.06))
    .force("charge", d3.forceManyBody().strength(-320))
    .force("center", d3.forceCenter(W / 2, H / 2))
    .force("collide", d3.forceCollide(d => radius(d) + 14));

  const self = data.nodes.find(n => n.id === "self");
  self.fx = W / 2; self.fy = H / 2;

  const link = g.append("g").selectAll("line").data(data.links).join("line")
    .attr("stroke", l => l.kind === "ref" ? "#b8c4d0" : "#e2e6ea")
    .attr("stroke-width", l => l.kind === "ref" ? 1.6 : 1);

  const node = g.append("g").selectAll("g").data(data.nodes).join("g")
    .style("cursor", "pointer")
    .call(d3.drag()
      .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.25).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on("end", (e, d) => { if (!e.active) sim.alphaTarget(0);
        if (d.id !== "self") { d.fx = null; d.fy = null; } }))
    .on("click", (e, d) => showPanel(d))
    .on("contextmenu", (e, d) => {
      e.preventDefault();
      const items = [{ icon: "info", label: "details", fn: () => showPanel(d) }];
      if (d.type === "proposal" && d.status === "pending") {
        const id = d.id.slice(5);
        items.push("-",
          { icon: "check", label: "accept", fn: () => act(id, "accept") },
          { icon: "x", label: "reject…", danger: true, fn: () => rejectWithReason(id) });
      }
      if (d.type === "proposal" && d.status === "accepted") {
        items.push("-", { icon: "undo-2", label: "revert", danger: true, fn: () => act(d.id.slice(5), "revert") });
      }
      if (d.id === "self") {
        items.push("-", { icon: "search", label: "search the world", fn: () => cbSearch.click() });
      }
      showCtx(e.clientX, e.clientY, items);
    });

  node.filter(d => d.id !== "self").append("circle")
    .attr("r", radius).attr("fill", d => color(d))
    .attr("fill-opacity", 0.85).attr("stroke", "#fff").attr("stroke-width", 2);

  const selfG = node.filter(d => d.id === "self");
  const S = 96, R = 30;
  selfG.on("mouseenter", () => setMouth("hopeful")).on("mouseleave", () => setMouth("neutral"));
  selfG.append("clipPath").attr("id", "sq")
    .append("rect").attr("x", -S/2).attr("y", -S/2).attr("width", S).attr("height", S).attr("rx", R);
  selfG.append("rect").attr("x", -S/2).attr("y", -S/2).attr("width", S).attr("height", S)
    .attr("rx", R).attr("fill", "#fff")
    .attr("stroke", "rgba(0,0,0,.12)").attr("stroke-width", 1);

  fetch("/avatar").then(r => r.text()).then(txt => {
    const doc = new DOMParser().parseFromString(txt, "image/svg+xml");
    const av = document.importNode(doc.documentElement, true);
    av.setAttribute("x", -S/2); av.setAttribute("y", -S/2);
    av.setAttribute("width", S); av.setAttribute("height", S);
    av.id = "ap-svg";
    selfG.append("g").attr("clip-path", "url(#sq)").node().appendChild(av);
    startFace();
    startParallax();
  });

  node.append("text").attr("class", "lbl").attr("text-anchor", "middle")
    .attr("dy", d => radius(d) + 14).text(d => d.label.length > 22 ? d.label.slice(0, 21) + "…" : d.label);

  sim.on("tick", () => {
    link.attr("x1", l => l.source.x).attr("y1", l => l.source.y)
        .attr("x2", l => l.target.x).attr("y2", l => l.target.y);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
  });
}

// ── node details panel ────────────────────────────────────────────────────
const panel = document.getElementById("panel");
function showPanel(d) {
  let html = `<h3>${esc(d.label)}</h3><span class="tag" style="background:${color(d)}">${d.type}${d.status ? " · " + d.status : ""}</span>`;
  if (d.type === "proposal" && d.status === "pending") {
    const id = d.id.slice(5);
    html += `<div style="margin-bottom:8px">
      <button class="ok" onclick="act('${id}','accept')">Accept</button>
      <button class="no" onclick="rejectWithReason('${id}')">Reject</button></div>`;
  }
  if (d.type === "proposal" && d.status === "accepted") {
    const id = d.id.slice(5);
    html += `<div style="margin-bottom:8px"><button onclick="act('${id}','revert')">Revert</button></div>`;
  }
  html += `<pre>${esc(d.detail || "")}</pre>`;
  panel.innerHTML = html; panel.style.display = "block";
}
document.addEventListener("keydown", e => { if (e.key === "Escape") panel.style.display = "none"; });
svg.on("click", e => { if (e.target.id === "graph") panel.style.display = "none"; });
svg.on("contextmenu", e => {
  if (e.target.id !== "graph" && e.target.tagName !== "rect") return;
  e.preventDefault();
  showCtx(e.clientX, e.clientY, [
    { icon: "file-plus-2", label: "new document", fn: () => openModal("note") },
    { icon: "pen-tool", label: "new sketch", fn: () => openModal("sketch") },
    { icon: "folder-plus", label: "new folder", fn: () => openModal("folder") }, "-",
    { icon: "bell", label: "notifications", fn: () => document.getElementById("cb-bell").click() }
  ]);
});
function act(id, verb) {
  fetch(`/proposal/${id}/${verb}`, { method: "POST", ...authed })
    .then(() => { panel.style.display = "none"; draw(); });
}
function rejectWithReason(id) {
  const reason = prompt("Reject reason (teaches the brain — optional):") || "";
  fetch(`/proposal/${id}/reject?reason=${encodeURIComponent(reason)}`, { method: "POST", ...authed })
    .then(() => { panel.style.display = "none"; draw(); });
}

// ── layout: panel changes only resize the VIEWPORT — the world never resets.
// Centering happens once, at draw (load/reload); after that the canvas is yours.
function relayout() {
  const stage = document.getElementById("stage");
  svg.attr("width", stage.clientWidth).attr("height", stage.clientHeight);
}
addEventListener("resize", relayout);

// pane resizing (tree / editor widths, console height) via CSS vars
function dragVar(handle, cssVar, compute) {
  handle.addEventListener("pointerdown", e => {
    e.preventDefault();
    handle.setPointerCapture(e.pointerId);
    document.getElementById("app").classList.add("dragging");  // 1:1, no easing mid-drag
    const move = ev => document.documentElement.style.setProperty(cssVar, compute(ev) + "px");
    const up = () => {
      removeEventListener("pointermove", move); removeEventListener("pointerup", up);
      document.getElementById("app").classList.remove("dragging");
      relayout();
    };
    addEventListener("pointermove", move); addEventListener("pointerup", up);
  });
}
dragVar(document.getElementById("treers"), "--tree-w", ev => Math.max(140, Math.min(420, ev.clientX)));
dragVar(document.getElementById("edrs"), "--ed-w",
  ev => Math.max(300, Math.min(innerWidth * 0.6, ev.clientX - document.getElementById("tree").offsetWidth)));
dragVar(document.getElementById("consgrip"), "--cons-h",
  ev => Math.max(26, Math.min(innerHeight * 0.5, innerHeight - ev.clientY)));

// ── console (SSE): collapsed by default; designed states, severity tints ────
const cons = document.getElementById("console");
const conslast = document.getElementById("conslast");
const conspulse = document.getElementById("conspulse");
const conscount = document.getElementById("conscount");
let consOpen = false, consLines = 0, pulseTimer = null, freshTimer = null;

function setConsole(open) {
  consOpen = open;
  document.getElementById("app").classList.toggle("console-open", open);
  document.documentElement.style.setProperty("--cons-h", open ? "170px" : "30px");
  // re-center the face to the final pane size once the track animation settles
  setTimeout(relayout, 320);
}
document.getElementById("conshead").onclick = e => {
  if (e.target.closest("#consgrip")) return;
  setConsole(!consOpen);
};

const severity = t =>
  /ACCEPTED|returned|registered|ok\b/.test(t) ? "ok" :
  /failed|rejected|WATCHDOG|error/i.test(t) ? "bad" :
  /PROPOSAL|queued|ATTENTION|REVERTED/.test(t) ? "warn" : "";

new EventSource("/sse").onmessage = e => {
  const div = document.createElement("div");
  div.className = "ln " + severity(e.data);
  div.textContent = e.data;
  cons.appendChild(div);
  while (cons.childNodes.length > 400) cons.removeChild(cons.firstChild);
  cons.scrollTop = cons.scrollHeight;

  consLines++;
  conscount.textContent = consLines + " lines";
  conslast.textContent = e.data;
  conslast.classList.add("fresh");
  clearTimeout(freshTimer); freshTimer = setTimeout(() => conslast.classList.remove("fresh"), 2000);
  conspulse.classList.add("live");
  clearTimeout(pulseTimer); pulseTimer = setTimeout(() => conspulse.classList.remove("live"), 1200);

  if (/PROPOSAL|ACCEPTED|REVERTED|rejected|limb|ATTENTION|request queued/.test(e.data)) {
    recentEvents.unshift(e.data);
    if (recentEvents.length > 20) recentEvents.pop();
    renderNotifications();
  }
  if (/PROPOSAL|ACCEPTED|REVERTED|rejected|limb registered/.test(e.data)) draw();
};

// after the editor slide animation settles, land the face on final center
document.getElementById("app").addEventListener("transitionend", ev => {
  if (ev.propertyName.startsWith("grid-template")) relayout();
});

// ══ APP-WIDE CONTEXT MENU ═══════════════════════════════════════════════
const ctx = document.getElementById("ctx");
function showCtx(x, y, items) {
  ctx.innerHTML = items.map((it, i) => it === "-" ? `<div class="sep"></div>` :
    `<div class="it ${it.danger ? "danger" : ""}" data-i="${i}">
       <i data-lucide="${it.icon}"></i>${esc(it.label)}</div>`).join("");
  ctx.querySelectorAll(".it").forEach(el =>
    el.onclick = () => { hideCtx(); items[+el.dataset.i].fn(); });
  ctx.style.left = Math.min(x, innerWidth - 200) + "px";
  ctx.style.top = Math.min(y, innerHeight - items.length * 34 - 12) + "px";
  ctx.classList.add("on");
  refreshIcons();
}
function hideCtx() { ctx.classList.remove("on"); }
addEventListener("click", e => { if (!ctx.contains(e.target)) hideCtx(); });
addEventListener("keydown", e => { if (e.key === "Escape") hideCtx(); });

// ── rename (double-click in header or tree; extension is free-form) ───────
async function renameNote(from, kind) {
  const base = from.split("/").pop();
  const to = await askRename(base);
  if (!to || to === base) return;
  const dir = from.includes("/") ? from.slice(0, from.lastIndexOf("/") + 1) : "";
  const target = dir + to;
  await fetch(`/notes/rename?from=${encodeURIComponent(from)}&to=${encodeURIComponent(target)}`,
    { method: "POST", ...authed });
  if (buffers[from]) { buffers[target] = buffers[from]; delete buffers[from]; persistBuffers(); }
  if (open.path === from) { open.path = target; document.getElementById("fname").textContent = target; }
  loadTree(); draw();
}
function askRename(current) {
  // inline, in-theme: reuse the modal frame as a tiny rename dialog
  return new Promise(resolve => {
    openModalRaw(`<h3>RENAME</h3>
      <input id="modalname" value="${esc(current)}" spellcheck="false">
      <div class="acts"><button id="modalcancel">cancel</button>
      <button class="go" id="modalgo">rename</button></div>`);
    const inp = document.getElementById("modalname");
    setTimeout(() => { inp.focus(); inp.select(); }, 60);
    const done = v => { closeModal(); resolve(v); };
    document.getElementById("modalcancel").onclick = () => done(null);
    document.getElementById("modalgo").onclick = () => done(inp.value.trim());
    inp.onkeydown = e => {
      if (e.key === "Enter") done(inp.value.trim());
      if (e.key === "Escape") done(null);
    };
  });
}
document.getElementById("fname").addEventListener("dblclick", () => {
  if (open.path) renameNote(open.path, open.kind);
});

function deleteNote(path) {
  fetch(`/notes/delete?path=${encodeURIComponent(path)}`, { method: "POST", ...authed })
    .then(() => {
      delete buffers[path]; persistBuffers();
      if (open.path === path) document.getElementById("closeed").onclick();
      loadTree(); draw(); updateDirtyUI();
    });
}

// ── tree drag-drop: set-list order + move into folders ────────────────────
let dragging = null;
function bindTreeDnD() {
  document.querySelectorAll("#tree .row").forEach(el => {
    el.draggable = true;
    el.addEventListener("dragstart", e => { dragging = el; e.dataTransfer.effectAllowed = "move"; });
    el.addEventListener("dragover", e => { e.preventDefault(); el.classList.add("dragover"); });
    el.addEventListener("dragleave", () => el.classList.remove("dragover"));
    el.addEventListener("drop", async e => {
      e.preventDefault(); el.classList.remove("dragover");
      if (!dragging || dragging === el) return;
      const from = dragging.dataset.path, name = from.split("/").pop();
      if (el.dataset.folder !== undefined) {
        // into the folder
        await fetch(`/notes/rename?from=${encodeURIComponent(from)}&to=${encodeURIComponent(el.dataset.path + "/" + name)}`,
          { method: "POST", ...authed });
      } else if (el.dataset.path) {
        const toDir = el.dataset.path.includes("/") ? el.dataset.path.slice(0, el.dataset.path.lastIndexOf("/")) : "";
        const fromDir = from.includes("/") ? from.slice(0, from.lastIndexOf("/")) : "";
        if (toDir !== fromDir) {
          await fetch(`/notes/rename?from=${encodeURIComponent(from)}&to=${encodeURIComponent((toDir ? toDir + "/" : "") + name)}`,
            { method: "POST", ...authed });
        }
        // reorder: place the dragged name before the drop target within its dir
        const rows = [...document.querySelectorAll(`#tree .row`)].filter(r => {
          const p = r.dataset.path || "";
          const d = p.includes("/") ? p.slice(0, p.lastIndexOf("/")) : "";
          return d === toDir && p;
        }).map(r => (r.dataset.path || "").split("/").pop());
        const without = rows.filter(n => n !== name);
        without.splice(without.indexOf(el.dataset.path.split("/").pop()), 0, name);
        await fetch(`/notes/reorder?dir=${encodeURIComponent(toDir)}&names=${encodeURIComponent(without.join("\n"))}`,
          { method: "POST", ...authed });
      }
      dragging = null;
      loadTree(); draw();
    });
  });
}

// ── canvas badges: morphing search + notifications drawer ─────────────────
const searchpop = document.getElementById("searchpop"), notif = document.getElementById("notif");
const cbSearch = document.getElementById("cb-search"), canvasbar = document.getElementById("canvasbar");

function syncActive() {
  canvasbar.classList.toggle("active",
    cbSearch.classList.contains("expanded") || notif.classList.contains("on"));
}
function collapseSearch() {
  cbSearch.classList.remove("expanded");
  searchpop.classList.remove("on");
  document.getElementById("searchin").value = "";
  document.getElementById("searchres").innerHTML = "";
  clearSearchDim(); syncActive();
}
cbSearch.addEventListener("click", e => {
  if (cbSearch.classList.contains("expanded")) return;   // clicks inside the bar are for the input
  notif.classList.remove("on");
  cbSearch.classList.add("expanded");
  syncActive();
  setTimeout(() => document.getElementById("searchin").focus(), 120);
});
document.getElementById("searchin").addEventListener("keydown", e => {
  if (e.key === "Escape") collapseSearch();
});
document.getElementById("searchin").addEventListener("blur", () => {
  setTimeout(() => { if (!document.getElementById("searchin").value.trim()) collapseSearch(); }, 150);
});
document.getElementById("cb-bell").onclick = () => {
  collapseSearch();
  notif.classList.toggle("on");
  syncActive();
};

function clearSearchDim() { g.selectAll("g > g").attr("opacity", 1); }
document.getElementById("searchin").addEventListener("input", e => {
  const q = e.target.value.trim().toLowerCase();
  const res = document.getElementById("searchres");
  searchpop.classList.toggle("on", !!q);
  if (!q) { res.innerHTML = ""; clearSearchDim(); return; }
  const hits = worldData.nodes.filter(n =>
    (n.label + " " + (n.detail || "")).toLowerCase().includes(q)).slice(0, 12);
  const ids = new Set(hits.map(h => h.id));
  // dim non-matches on the canvas
  g.selectAll("g").filter(function () { return this.__data__ && this.__data__.id; })
    .attr("opacity", d => ids.has(d.id) ? 1 : 0.15);
  res.innerHTML = hits.map(h =>
    `<div class="it" data-id="${esc(h.id)}"><span class="sw" style="background:${color(h)}"></span>${esc(h.label)}</div>`).join("");
  res.querySelectorAll(".it").forEach(el => el.onclick = () => zoomTo(el.dataset.id));
});
function zoomTo(id) {
  const n = worldData.nodes.find(n => n.id === id);
  if (!n) return;
  const stage = document.getElementById("stage");
  const t = d3.zoomIdentity.translate(stage.clientWidth / 2 - n.x * 1.25, stage.clientHeight / 2 - n.y * 1.25).scale(1.25);
  svg.transition().duration(550).call(zoomB.transform, t);
  showPanel(n);
}

function renderNotifications() {
  const pend = worldData.nodes.filter(n => n.type === "proposal" && n.status === "pending");
  const bdg = document.getElementById("bellbdg");
  bdg.style.display = pend.length ? "flex" : "none";
  bdg.textContent = pend.length;
  const body = document.getElementById("notifbody");
  body.innerHTML =
    (pend.length ? pend.map(p => {
      const id = p.id.slice(5);
      return `<div class="card"><div class="t">${esc(p.label)}</div>
        <div class="d">${esc((p.detail || "").slice(0, 160))}</div>
        <button class="ok" onclick="act('${id}','accept')">accept</button>
        <button class="no" onclick="rejectWithReason('${id}')">reject</button></div>`;
    }).join("") : `<div class="ev">nothing pending — proposals land here for review</div>`)
    + recentEvents.map(t => `<div class="ev">${esc(t)}</div>`).join("");
}
const recentEvents = [];

setMode(mode);
loadTree();
draw();
refreshIcons();
updateDirtyUI();   // hot exit: restored buffers resurface the pill + tree dots
</script>
