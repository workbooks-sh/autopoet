<!doctype html>
<meta charset="utf-8">
<title>autopoet</title>
<style>
  :root { --ink:#223; --paper:#fbfbf9; --grid:#e6e8ea; --line:#e3e5e8; }
  html,body { margin:0; height:100%; overflow:hidden;
    font:13px/1.5 ui-monospace,SFMono-Regular,monospace; color:var(--ink);
    background:var(--paper); }

  #app { display:grid; height:100vh;
    grid-template-columns:var(--tree-w,240px) 0px 1fr;
    grid-template-rows:1fr var(--cons-h,30px);
    transition:grid-template-columns .32s cubic-bezier(.22,.9,.24,1),
               grid-template-rows .28s cubic-bezier(.22,.9,.24,1); }
  #app.editing { grid-template-columns:var(--tree-w,240px) var(--ed-w,480px) 1fr; }
  #app.dragging { transition:none; }   /* 1:1 tracking while a handle is held */

  /* resize handles */
  .rs { position:absolute; top:0; bottom:0; right:-3px; width:6px; cursor:col-resize; z-index:8; }
  .rs:hover { background:rgba(80,120,220,.18); }
  #consgrip { position:absolute; left:0; right:0; top:-3px; height:6px; cursor:row-resize; z-index:8; }
  #consgrip:hover { background:rgba(80,120,220,.25); }

  /* ── vault tree (green in the mock) ─────────────────────────────────── */
  #tree { grid-row:1; grid-column:1; border-right:1px solid var(--line);
    background:#f7f7f4; overflow:auto; padding:40px 0 10px; position:relative; }
  #tree .hd { display:flex; align-items:center; gap:6px; padding:2px 10px 8px;
    color:#889; font-size:11px; }
  #tree .hd b { flex:1; font-weight:600; letter-spacing:.06em; }
  #tree .hd button { border:none; background:none; cursor:pointer; padding:3px;
    border-radius:6px; display:flex; align-items:center; color:#7a8290;
    transition:background .15s ease, color .15s ease; }
  #tree .hd button:hover { background:#e8e8e2; color:#3a4250; }
  #tree .hd button svg { width:15px; height:15px; }
  #tree svg.lucide { width:14px; height:14px; flex:none; }
  .ic-folder { color:#c9a04e; } .ic-note { color:#5b8cc9; } .ic-sketch { color:#a97bc0; }
  #tree ul { list-style:none; margin:0; padding-left:14px; }
  #tree > ul { padding-left:6px; }
  #tree li > .row { display:flex; align-items:center; gap:6px; padding:2px 6px;
    border-radius:5px; cursor:pointer; white-space:nowrap; }
  #tree li > .row:hover { background:#ececе6; background:#ecece6; }
  #tree li > .row.open { background:#e4e8f5; }
  #tree svg.ic { width:13px; height:13px; flex:none; }

  /* ── prose / sketch editor (blue in the mock) ───────────────────────── */
  #editor { grid-row:1; grid-column:2; border-right:1px solid var(--line);
    display:none; flex-direction:column; background:#fff; min-width:0; position:relative;
    opacity:0; transform:translateX(-8px);
    transition:opacity .28s ease .1s, transform .28s cubic-bezier(.22,.9,.24,1) .1s; }
  #app.editing #editor { opacity:1; transform:none; }
  #app.editing #editor { display:flex; }
  #editor .hd { display:flex; align-items:center; gap:8px; padding:40px 14px 8px;
    color:#667; font-size:11px; border-bottom:1px solid var(--line); }
  #editor .hd .name { flex:1; overflow:hidden; text-overflow:ellipsis; }
  #editor .hd .dot { width:8px; height:8px; border-radius:50%; background:#bbb; }
  #editor .hd .dot.dirty { background:#f2c14e; }
  #editor .hd .dot.saved { background:#6aa84f; }
  #editor .hd button { font:inherit; border:none; background:none; cursor:pointer; color:#99a;
    display:flex; padding:3px; border-radius:6px; transition:background .15s ease, color .15s ease; }
  #editor .hd button:hover { background:#f0f0ec; color:#3a4250; }
  #editor .hd svg.lucide { width:14px; height:14px; }
  #prose { flex:1; border:none; outline:none; resize:none; padding:18px 20px;
    font:14px/1.7 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:#223;
    background:#fff; }
  #sketch { flex:1; touch-action:none; cursor:crosshair; background:#fff; display:none; }
  #app.sketching #prose { display:none; }
  #app.sketching #sketch { display:block; }

  /* ── the world (graph) ──────────────────────────────────────────────── */
  #stage { grid-row:1; grid-column:3; position:relative; min-width:0; }
  #graph { position:absolute; inset:0; width:100%; height:100%; cursor:grab; }
  #graph:active { cursor:grabbing; }
  text.lbl { font:11px ui-monospace,monospace; fill:#556; pointer-events:none; }

  /* ── console footer: collapsed by default, designed in-theme ─────────── */
  #consolewrap { grid-row:2; grid-column:1 / -1; position:relative;
    border-top:1px solid var(--line); background:#f7f7f4; color:#556;
    display:flex; flex-direction:column; min-height:0; }
  #conshead { display:flex; align-items:center; gap:8px; padding:5px 14px;
    font-size:11px; color:#7a8290; cursor:pointer; user-select:none; flex:none;
    transition:background .15s ease; }
  #conshead:hover { background:#efefe9; }
  #conshead svg.lucide { width:13px; height:13px; }
  #conshead .chev { transition:transform .25s cubic-bezier(.22,.9,.24,1); display:flex; }
  #app.console-open #conshead .chev { transform:rotate(90deg); }
  #conshead .ttl { font-weight:600; letter-spacing:.05em; }
  #conshead .pulse { width:6px; height:6px; border-radius:50%; background:#c6ccd4;
    transition:background .2s ease, box-shadow .2s ease; }
  #conshead .pulse.live { background:#6aa84f; box-shadow:0 0 0 3px rgba(106,168,79,.18); }
  #conshead .last { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    color:#98a0ac; transition:color .3s ease; }
  #conshead .last.fresh { color:#3a4250; }
  #conshead .count { color:#b3bac4; font-size:10px; }
  #console { flex:1; overflow:auto; margin:0; padding:4px 14px 10px;
    font-size:11px; line-height:1.7; color:#556;
    opacity:0; transition:opacity .25s ease .08s; pointer-events:none; }
  #app.console-open #console { opacity:1; pointer-events:auto; }
  #console .ln { white-space:pre-wrap; word-break:break-all;
    animation:lnin .25s ease; border-left:2px solid transparent; padding-left:8px; }
  #console .ln.ok { border-left-color:#9ec99a; }
  #console .ln.warn { border-left-color:#e8cb7a; }
  #console .ln.bad { border-left-color:#dfa09a; }
  @keyframes lnin { from { opacity:0; transform:translateY(3px); } }

  /* node details panel */
  #panel { position:fixed; top:16px; right:16px; width:340px; max-height:66vh;
    overflow:auto; background:#fff; border:1px solid #ddd; border-radius:10px;
    padding:14px; box-shadow:0 6px 24px rgba(0,0,0,.08); display:none; z-index:6; }
  #panel h3 { margin:0 0 6px; font-size:13px; word-break:break-all; }
  #panel pre { white-space:pre-wrap; word-break:break-word; font-size:11px; color:#445; }
  #panel .tag { display:inline-block; padding:1px 8px; border-radius:99px;
    font-size:10px; color:#fff; margin-bottom:8px; }
  #panel button { font:inherit; padding:3px 12px; cursor:pointer; margin-right:6px;
    border-radius:6px; border:1px solid #ccc; background:#fff; }
  #panel button.ok { background:#e8f5e9; } #panel button.no { background:#fdecea; }

  /* ── new-file modal (ours, not the system prompt) ────────────────────── */
  #shade { position:fixed; inset:0; background:rgba(30,34,40,.28); z-index:20;
    display:none; opacity:0; transition:opacity .2s ease; }
  #shade.on { display:block; opacity:1; }
  #modal { position:fixed; z-index:21; top:18vh; left:50%; width:380px;
    transform:translateX(-50%) translateY(8px) scale(.98); opacity:0; display:none;
    background:#fff; border:1px solid var(--line); border-radius:12px;
    box-shadow:0 18px 48px rgba(0,0,0,.16); padding:16px;
    transition:opacity .22s ease, transform .22s cubic-bezier(.22,.9,.24,1); }
  #modal.on { display:block; opacity:1; transform:translateX(-50%) translateY(0) scale(1); }
  #modal h3 { margin:0 0 10px; font-size:12px; letter-spacing:.06em; color:#889; font-weight:600; }
  #modal .kind { display:flex; gap:10px; align-items:center; padding:9px 10px;
    border:1px solid var(--line); border-radius:9px; cursor:pointer; margin-bottom:6px;
    transition:border-color .15s ease, background .15s ease; }
  #modal .kind:hover { background:#f7f7f4; }
  #modal .kind.sel { border-color:#5b8cc9; background:#f2f6fb; }
  #modal .kind svg.lucide { width:17px; height:17px; flex:none; }
  #modal .kind .t { font-weight:600; font-size:12px; }
  #modal .kind .d { font-size:11px; color:#98a0ac;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif; }
  #modal input { width:100%; box-sizing:border-box; margin:10px 0 12px; padding:7px 10px;
    font:inherit; border:1px solid var(--line); border-radius:8px; outline:none; }
  #modal input:focus { border-color:#5b8cc9; }
  #modal .acts { display:flex; justify-content:flex-end; gap:8px; }
  #modal .acts button { font:inherit; padding:5px 14px; border-radius:8px;
    border:1px solid var(--line); background:#fff; cursor:pointer; }
  #modal .acts .go { background:#223; color:#fff; border-color:#223; }

  /* ── command / live mode ─────────────────────────────────────────────── */
  #modetoggle { position:fixed; top:0; left:calc(var(--tree-w,240px) - 84px);
    height:32px; z-index:10; display:flex; align-items:center;
    -webkit-app-region:no-drag; }
  #modetoggle .seg { display:flex; border:1px solid var(--line); border-radius:7px;
    overflow:hidden; background:#fff; }
  #modetoggle button { font:10px ui-monospace,monospace; border:none; background:none;
    padding:2px 8px; cursor:pointer; color:#98a0ac; display:flex; align-items:center; gap:4px;
    transition:background .15s ease, color .15s ease; }
  #modetoggle button.sel { background:#223; color:#fff; }
  #modetoggle svg.lucide { width:10px; height:10px; }

  #savebar { position:fixed; bottom:44px; left:12px; z-index:12;
    width:calc(var(--tree-w,240px) - 24px);
    display:flex; align-items:center; gap:10px; padding:9px 14px;
    background:#223; color:#e8eaf0; border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,.22);
    opacity:0; transform:translateY(10px); pointer-events:none;
    transition:opacity .22s ease, transform .22s cubic-bezier(.22,.9,.24,1),
               width .28s cubic-bezier(.22,.9,.24,1); }
  #app.editing #savebar { width:calc(var(--tree-w,240px) + var(--ed-w,480px) - 24px); }
  #savebar.on { opacity:1; transform:none; pointer-events:auto; }
  #savebar kbd { background:#3a4250; border-radius:5px; padding:1px 7px; font:inherit; }
  #savebar .msg { flex:1; font-size:11px; }
  #savebar button { font:10px ui-monospace,monospace; border:1px solid #4a5262;
    background:none; color:#aab4be; border-radius:6px; padding:2px 9px; cursor:pointer; }
  #savebar button:hover { color:#fff; }

  /* custom chrome (frameless mode) */
  #chrome { position:fixed; top:0; left:0; width:240px; height:32px; z-index:9;
    display:__CHROME__; align-items:center; gap:8px; padding-left:13px;
    -webkit-app-region:drag; }
  .tl { width:12px; height:12px; border-radius:50%; cursor:pointer; -webkit-app-region:no-drag; }
  .tl.close { background:#ff5f57; } .tl.min { background:#febc2e; } .tl.max { background:#28c840; }
</style>

<div id="chrome">
  <span class="tl close" title="close"></span>
  <span class="tl min" title="minimize"></span>
  <span class="tl max" title="zoom"></span>
</div>

<div id="app">
  <div id="tree">
    <div class="rs" id="treers"></div>
    <div class="hd"><b>VAULT</b>
      <button id="newnote" title="new document"><i data-lucide="file-plus-2"></i></button>
      <button id="newsketch" title="new sketch"><i data-lucide="pen-tool"></i></button>
      <button id="newfolder" title="new folder"><i data-lucide="folder-plus"></i></button>
    </div>
    <ul id="treeroot"></ul>
  </div>

  <div id="editor">
    <div class="rs" id="edrs"></div>
    <div class="hd">
      <span class="dot" id="savedot"></span>
      <span class="name" id="fname"></span>
      <button id="closeed" title="close"><i data-lucide="x"></i></button>
    </div>
    <textarea id="prose" spellcheck="false" placeholder="write plainly — this is your source of truth"></textarea>
    <svg id="sketch" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div id="stage"><svg id="graph"></svg></div>
  <div id="consolewrap">
    <div id="consgrip"></div>
    <div id="conshead">
      <span class="chev"><i data-lucide="chevron-right"></i></span>
      <i data-lucide="terminal"></i>
      <span class="ttl">console</span>
      <span class="pulse" id="conspulse"></span>
      <span class="last" id="conslast"></span>
      <span class="count" id="conscount"></span>
    </div>
    <div id="console"></div>
  </div>
</div>

<div id="panel"></div>

<div id="modetoggle"><div class="seg">
  <button id="mode-command" title="changes wait for ⌘S"><i data-lucide="command"></i>cmd</button>
  <button id="mode-live" title="changes translate as you type"><i data-lucide="zap"></i>live</button>
</div></div>

<div id="savebar">
  <span class="msg">unsaved changes — <kbd>⌘S</kbd> to save &amp; translate</span>
  <button id="golive">go live</button>
</div>

<div id="shade"></div>
<div id="modal">
  <h3>NEW IN VAULT</h3>
  <div class="kind" data-kind="note">
    <span class="ic-note"><i data-lucide="file-text"></i></span>
    <div><div class="t">document</div>
      <div class="d">plain language — your thoughts become real structure on save</div></div>
  </div>
  <div class="kind" data-kind="sketch">
    <span class="ic-sketch"><i data-lucide="pen-tool"></i></span>
    <div><div class="t">sketch</div>
      <div class="d">freehand drawing — the autopoet interprets what you draw</div></div>
  </div>
  <div class="kind" data-kind="folder">
    <span class="ic-folder"><i data-lucide="folder"></i></span>
    <div><div class="t">folder</div>
      <div class="d">you can put shit in it</div></div>
  </div>
  <input id="modalname" placeholder="name (nest with /)" spellcheck="false">
  <div class="acts">
    <button id="modalcancel">cancel</button>
    <button class="go" id="modalgo">create</button>
  </div>
</div>

<script src="/static/d3.v7.min.js"></script>
<script src="/static/lucide.min.js"></script>
<script>
const TOKEN = "__TOKEN__";
const authed = { headers: { authorization: `Bearer ${TOKEN}` } };

// ── window chrome ─────────────────────────────────────────────────────────
function win(a) { fetch("/win/" + a, { method: "POST", ...authed }); }
document.querySelector("#chrome .close")?.addEventListener("click", () => win("close"));
document.querySelector("#chrome .min")?.addEventListener("click", () => win("minimize"));
document.querySelector("#chrome .max")?.addEventListener("click", () => win("maximize"));

// ── error surfacing (no devtools in the webview) ─────────────────────────
function fatal(msg) {
  let b = document.getElementById("err");
  if (!b) { b = document.createElement("pre"); b.id = "err";
    b.style = "position:fixed;top:8px;right:8px;z-index:99;background:#fdecea;color:#a00;padding:8px;border-radius:6px;max-width:60vw;white-space:pre-wrap";
    document.body.appendChild(b); }
  b.textContent = "error: " + msg;
}
addEventListener("error", e => fatal(e.message + " @ " + e.filename + ":" + e.lineno));
addEventListener("unhandledrejection", e => fatal(String(e.reason)));

// ══ VAULT ═══════════════════════════════════════════════════════════════
const ICONS = {
  folder: `<span class="ic-folder"><i data-lucide="folder"></i></span>`,
  note:   `<span class="ic-note"><i data-lucide="file-text"></i></span>`,
  sketch: `<span class="ic-sketch"><i data-lucide="pen-tool"></i></span>`
};
const refreshIcons = () => window.lucide && lucide.createIcons();
let open = { path: null, kind: null, dirty: false };

async function loadTree() {
  const tree = await (await fetch("/notes/tree.json")).json();
  document.getElementById("treeroot").innerHTML = renderTree(tree);
  document.querySelectorAll("#tree .row[data-path]").forEach(el => {
    el.onclick = () => openFile(el.dataset.path, el.dataset.kind);
    if (el.dataset.path === open.path) el.classList.add("open");
  });
  refreshIcons();
}
function renderTree(items) {
  return items.map(n => n.type === "folder"
    ? `<li><div class="row">${ICONS.folder}<span>${esc(n.name)}</span></div><ul>${renderTree(n.children || [])}</ul></li>`
    : `<li><div class="row" data-path="${esc(n.path)}" data-kind="${n.type}">${ICONS[n.type]}<span>${esc(n.name)}</span></div></li>`
  ).join("");
}
const esc = s => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;");

async function openFile(path, kind) {
  await flushSave();
  const content = await (await fetch("/notes/file?path=" + encodeURIComponent(path))).text();
  open = { path, kind, dirty: false };
  document.getElementById("fname").textContent = path;
  document.getElementById("app").classList.add("editing");
  document.getElementById("app").classList.toggle("sketching", kind === "sketch");
  if (kind === "sketch") loadSketch(content);
  else document.getElementById("prose").value = content;
  setDot("saved");
  loadTree();
  relayout();   // the graph pane just narrowed — keep the face centered in it
}
document.getElementById("closeed").onclick = async () => {
  await flushSave();
  open = { path: null, kind: null, dirty: false };
  document.getElementById("app").classList.remove("editing", "sketching");
  loadTree();
  relayout();   // the graph pane just widened — re-center the face
};

// ── command / live save modes ─────────────────────────────────────────────
// command (default): edits wait; the savebar floats up; ⌘S saves & translates.
// live: edits autosave (debounced) straight into the translation lane.
let mode = localStorage.getItem("ap-mode") || "command";
function setMode(m) {
  mode = m; localStorage.setItem("ap-mode", m);
  document.getElementById("mode-command").classList.toggle("sel", m === "command");
  document.getElementById("mode-live").classList.toggle("sel", m === "live");
  if (m === "live") { flushSave(); showSavebar(false); }
}
document.getElementById("mode-command").onclick = () => setMode("command");
document.getElementById("mode-live").onclick = () => setMode("live");
document.getElementById("golive").onclick = () => setMode("live");
function showSavebar(on) { document.getElementById("savebar").classList.toggle("on", on); }

addEventListener("keydown", e => {
  if ((e.metaKey || e.ctrlKey) && e.key === "s") {
    e.preventDefault();
    flushSave(); showSavebar(false);
  }
});

let saveTimer = null;
function setDot(cls) { document.getElementById("savedot").className = "dot " + cls; }
function scheduleSave() {
  open.dirty = true; setDot("dirty");
  if (mode === "live") {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(flushSave, 900);
  } else {
    showSavebar(true);
  }
}
async function flushSave() {
  clearTimeout(saveTimer); saveTimer = null;
  if (!open.path || !open.dirty) return;
  const body = open.kind === "sketch" ? serializeSketch() : document.getElementById("prose").value;
  await fetch("/notes/save?path=" + encodeURIComponent(open.path), { method: "POST", body, ...authed });
  open.dirty = false; setDot("saved"); showSavebar(false);
}
document.getElementById("prose").addEventListener("input", scheduleSave);

// ── the new-file modal (ours, in-theme — never the system prompt) ─────────
let modalKind = "note";
function openModal(kind) {
  modalKind = kind;
  document.querySelectorAll("#modal .kind").forEach(el =>
    el.classList.toggle("sel", el.dataset.kind === kind));
  document.getElementById("shade").classList.add("on");
  document.getElementById("modal").classList.add("on");
  const inp = document.getElementById("modalname");
  inp.value = ""; setTimeout(() => inp.focus(), 60);
}
function closeModal() {
  document.getElementById("shade").classList.remove("on");
  document.getElementById("modal").classList.remove("on");
}
document.querySelectorAll("#modal .kind").forEach(el =>
  el.onclick = () => openModal(el.dataset.kind));
document.getElementById("shade").onclick = closeModal;
document.getElementById("modalcancel").onclick = closeModal;
document.getElementById("modalname").addEventListener("keydown", e => {
  if (e.key === "Enter") createFromModal();
  if (e.key === "Escape") closeModal();
});
document.getElementById("modalgo").onclick = createFromModal;

function createFromModal() {
  const name = document.getElementById("modalname").value.trim();
  if (!name) return;
  const path = modalKind === "sketch" ? (name.endsWith(".sketch.svg") ? name : name + ".sketch.svg")
             : modalKind === "note" ? (name.endsWith(".md") ? name : name + ".md")
             : name;
  fetch(`/notes/new?path=${encodeURIComponent(path)}&kind=${modalKind}`, { method: "POST", ...authed })
    .then(() => loadTree())
    .then(() => { closeModal(); if (modalKind !== "folder") openFile(path, modalKind); });
}
document.getElementById("newnote").onclick = () => openModal("note");
document.getElementById("newsketch").onclick = () => openModal("sketch");
document.getElementById("newfolder").onclick = () => openModal("folder");

// ── sketch surface: freehand strokes → SVG paths ─────────────────────────
const sk = document.getElementById("sketch");
let drawing = null;
function loadSketch(svgText) {
  const doc = new DOMParser().parseFromString(svgText, "image/svg+xml");
  sk.setAttribute("viewBox", doc.documentElement.getAttribute("viewBox") || "0 0 1200 800");
  sk.innerHTML = doc.documentElement.innerHTML;
}
function serializeSketch() {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${sk.getAttribute("viewBox")}" fill="none">\n${sk.innerHTML}\n</svg>`;
}
function skPoint(e) {
  const pt = new DOMPoint(e.clientX, e.clientY).matrixTransform(sk.getScreenCTM().inverse());
  return `${pt.x.toFixed(1)} ${pt.y.toFixed(1)}`;
}
sk.addEventListener("pointerdown", e => {
  sk.setPointerCapture(e.pointerId);
  drawing = document.createElementNS("http://www.w3.org/2000/svg", "path");
  drawing.setAttribute("d", "M " + skPoint(e));
  drawing.setAttribute("stroke", "#223"); drawing.setAttribute("stroke-width", "2.5");
  drawing.setAttribute("stroke-linecap", "round"); drawing.setAttribute("fill", "none");
  sk.appendChild(drawing);
});
sk.addEventListener("pointermove", e => { if (drawing) drawing.setAttribute("d", drawing.getAttribute("d") + " L " + skPoint(e)); });
addEventListener("pointerup", () => { if (drawing) { drawing = null; scheduleSave(); } });

// ══ THE WORLD (graph) ═══════════════════════════════════════════════════
const COLORS = {
  self: "#223", doc: "#4a90d9", guide: "#8e7cc3", limb: "#e07a5f", request: "#d96ba0",
  proposal: { pending:"#f2c14e", accepted:"#6aa84f", rejected:"#cc4125",
              "rejected-by-gate":"#a61c00", reverted:"#999" }
};
const color = n => n.type === "proposal" ? (COLORS.proposal[n.status] || "#f2c14e") : (COLORS[n.type] || "#888");
const radius = n => n.type === "self" ? 46 : (n.type === "doc" ? 16 : 13);

const svg = d3.select("#graph"), g = svg.append("g");
svg.call(d3.zoom().scaleExtent([0.25, 3]).on("zoom", e => g.attr("transform", e.transform)));

// infinite Figma-style sheet: the paper is geometry in world space
const defs = svg.append("defs");
defs.append("pattern").attr("id", "grid-minor").attr("width", 24).attr("height", 24).attr("patternUnits", "userSpaceOnUse")
  .append("path").attr("d", "M 24 0 H 0 V 24").attr("fill", "none").attr("stroke", "var(--grid)").attr("stroke-width", 1);
defs.append("pattern").attr("id", "grid-major").attr("width", 120).attr("height", 120).attr("patternUnits", "userSpaceOnUse")
  .append("path").attr("d", "M 120 0 H 0 V 120").attr("fill", "none").attr("stroke", "#d8dce0").attr("stroke-width", 1.2);
const SHEET = 100000;
function paper(sel) {
  for (const id of ["grid-minor", "grid-major"])
    sel.append("rect").attr("x", -SHEET/2).attr("y", -SHEET/2).attr("width", SHEET).attr("height", SHEET)
       .attr("fill", `url(#${id})`).attr("pointer-events", "none");
}

// ── the face ──────────────────────────────────────────────────────────────
let MOUTHS = {};
fetch("/avatar/mouths.json").then(r => r.json()).then(m => MOUTHS = m);
function setMouth(mood) {
  const g = document.getElementById("ap-mouth");
  if (g && MOUTHS[mood]) g.innerHTML = MOUTHS[mood];
}
function blinkOnce() {
  const eyes = document.getElementById("ap-eyes");
  if (!eyes) return;
  eyes.style.transform = "scaleY(0.08)";
  setTimeout(() => { eyes.style.transform = "scaleY(1)"; }, 95);
}
let faceStarted = false;
function startFace() {
  if (faceStarted) return; faceStarted = true;
  (function loop() {
    blinkOnce();
    if (Math.random() < 0.25) setTimeout(blinkOnce, 220);
    setTimeout(loop, 3000 + Math.random() * 3000);
  })();
}
let parallaxOn = false;
function startParallax() {
  if (parallaxOn) return; parallaxOn = true;
  let tx = 0, ty = 0, want = { x: 0, y: 0 }, raf = null;
  function onMove(e) {
    const av = document.getElementById("ap-svg");
    if (!av) return;
    const r = av.getBoundingClientRect();
    if (!r.width) return;
    want = {
      x: Math.max(-1, Math.min(1, (e.clientX - (r.left + r.width / 2)) / (r.width * 0.9))),
      y: Math.max(-1, Math.min(1, (e.clientY - (r.top + r.height / 2)) / (r.height * 0.9)))
    };
    if (!raf) raf = requestAnimationFrame(apply);
  }
  function apply() {
    raf = null;
    const face = document.getElementById("ap-face"), eyesPx = document.getElementById("ap-eyes-px");
    if (!face || !eyesPx) return;
    tx += (want.x - tx) * 0.35; ty += (want.y - ty) * 0.35;
    face.setAttribute("transform",
      `translate(${(tx * 2.2).toFixed(2)} ${(ty * 2.2).toFixed(2)}) skewX(${(-tx * 1.8).toFixed(2)}) skewY(${(ty * 1.0).toFixed(2)})`);
    eyesPx.setAttribute("transform", `translate(${(tx * 0.8).toFixed(2)} ${(ty * 0.8).toFixed(2)})`);
    if (Math.abs(want.x - tx) > 0.005 || Math.abs(want.y - ty) > 0.005) raf = requestAnimationFrame(apply);
  }
  addEventListener("mousemove", onMove, { passive: true });
}

let sim;
async function draw() {
  const stage = document.getElementById("stage");
  const W = stage.clientWidth, H = stage.clientHeight;
  svg.attr("width", W).attr("height", H);
  let data;
  try { data = await (await fetch("/graph.json")).json(); }
  catch (err) { return fatal("graph.json fetch failed: " + err); }
  if (!data.nodes || !data.nodes.length) return fatal("graph.json returned no nodes");
  g.selectAll("*").remove();
  paper(g);

  sim = d3.forceSimulation(data.nodes)
    .force("link", d3.forceLink(data.links).id(d => d.id)
      .distance(l => l.kind === "ref" ? 90 : 150).strength(l => l.kind === "ref" ? 0.5 : 0.06))
    .force("charge", d3.forceManyBody().strength(-320))
    .force("center", d3.forceCenter(W / 2, H / 2))
    .force("collide", d3.forceCollide(d => radius(d) + 14));

  const self = data.nodes.find(n => n.id === "self");
  self.fx = W / 2; self.fy = H / 2;

  const link = g.append("g").selectAll("line").data(data.links).join("line")
    .attr("stroke", l => l.kind === "ref" ? "#b8c4d0" : "#e2e6ea")
    .attr("stroke-width", l => l.kind === "ref" ? 1.6 : 1);

  const node = g.append("g").selectAll("g").data(data.nodes).join("g")
    .style("cursor", "pointer")
    .call(d3.drag()
      .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.25).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on("end", (e, d) => { if (!e.active) sim.alphaTarget(0);
        if (d.id !== "self") { d.fx = null; d.fy = null; } }))
    .on("click", (e, d) => showPanel(d));

  node.filter(d => d.id !== "self").append("circle")
    .attr("r", radius).attr("fill", d => color(d))
    .attr("fill-opacity", 0.85).attr("stroke", "#fff").attr("stroke-width", 2);

  const selfG = node.filter(d => d.id === "self");
  const S = 96, R = 30;
  selfG.on("mouseenter", () => setMouth("hopeful")).on("mouseleave", () => setMouth("neutral"));
  selfG.append("clipPath").attr("id", "sq")
    .append("rect").attr("x", -S/2).attr("y", -S/2).attr("width", S).attr("height", S).attr("rx", R);
  selfG.append("rect").attr("x", -S/2).attr("y", -S/2).attr("width", S).attr("height", S)
    .attr("rx", R).attr("fill", "#fff")
    .attr("stroke", "rgba(0,0,0,.12)").attr("stroke-width", 1);

  fetch("/avatar").then(r => r.text()).then(txt => {
    const doc = new DOMParser().parseFromString(txt, "image/svg+xml");
    const av = document.importNode(doc.documentElement, true);
    av.setAttribute("x", -S/2); av.setAttribute("y", -S/2);
    av.setAttribute("width", S); av.setAttribute("height", S);
    av.id = "ap-svg";
    selfG.append("g").attr("clip-path", "url(#sq)").node().appendChild(av);
    startFace();
    startParallax();
  });

  node.append("text").attr("class", "lbl").attr("text-anchor", "middle")
    .attr("dy", d => radius(d) + 14).text(d => d.label.length > 22 ? d.label.slice(0, 21) + "…" : d.label);

  sim.on("tick", () => {
    link.attr("x1", l => l.source.x).attr("y1", l => l.source.y)
        .attr("x2", l => l.target.x).attr("y2", l => l.target.y);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
  });
}

// ── node details panel ────────────────────────────────────────────────────
const panel = document.getElementById("panel");
function showPanel(d) {
  let html = `<h3>${esc(d.label)}</h3><span class="tag" style="background:${color(d)}">${d.type}${d.status ? " · " + d.status : ""}</span>`;
  if (d.type === "proposal" && d.status === "pending") {
    const id = d.id.slice(5);
    html += `<div style="margin-bottom:8px">
      <button class="ok" onclick="act('${id}','accept')">Accept</button>
      <button class="no" onclick="rejectWithReason('${id}')">Reject</button></div>`;
  }
  if (d.type === "proposal" && d.status === "accepted") {
    const id = d.id.slice(5);
    html += `<div style="margin-bottom:8px"><button onclick="act('${id}','revert')">Revert</button></div>`;
  }
  html += `<pre>${esc(d.detail || "")}</pre>`;
  panel.innerHTML = html; panel.style.display = "block";
}
document.addEventListener("keydown", e => { if (e.key === "Escape") panel.style.display = "none"; });
svg.on("click", e => { if (e.target.id === "graph") panel.style.display = "none"; });
function act(id, verb) {
  fetch(`/proposal/${id}/${verb}`, { method: "POST", ...authed })
    .then(() => { panel.style.display = "none"; draw(); });
}
function rejectWithReason(id) {
  const reason = prompt("Reject reason (teaches the brain — optional):") || "";
  fetch(`/proposal/${id}/reject?reason=${encodeURIComponent(reason)}`, { method: "POST", ...authed })
    .then(() => { panel.style.display = "none"; draw(); });
}

// ── layout: panel changes only resize the VIEWPORT — the world never resets.
// Centering happens once, at draw (load/reload); after that the canvas is yours.
function relayout() {
  const stage = document.getElementById("stage");
  svg.attr("width", stage.clientWidth).attr("height", stage.clientHeight);
}
addEventListener("resize", relayout);

// pane resizing (tree / editor widths, console height) via CSS vars
function dragVar(handle, cssVar, compute) {
  handle.addEventListener("pointerdown", e => {
    e.preventDefault();
    handle.setPointerCapture(e.pointerId);
    document.getElementById("app").classList.add("dragging");  // 1:1, no easing mid-drag
    const move = ev => document.documentElement.style.setProperty(cssVar, compute(ev) + "px");
    const up = () => {
      removeEventListener("pointermove", move); removeEventListener("pointerup", up);
      document.getElementById("app").classList.remove("dragging");
      relayout();
    };
    addEventListener("pointermove", move); addEventListener("pointerup", up);
  });
}
dragVar(document.getElementById("treers"), "--tree-w", ev => Math.max(140, Math.min(420, ev.clientX)));
dragVar(document.getElementById("edrs"), "--ed-w",
  ev => Math.max(300, Math.min(innerWidth * 0.6, ev.clientX - document.getElementById("tree").offsetWidth)));
dragVar(document.getElementById("consgrip"), "--cons-h",
  ev => Math.max(26, Math.min(innerHeight * 0.5, innerHeight - ev.clientY)));

// ── console (SSE): collapsed by default; designed states, severity tints ────
const cons = document.getElementById("console");
const conslast = document.getElementById("conslast");
const conspulse = document.getElementById("conspulse");
const conscount = document.getElementById("conscount");
let consOpen = false, consLines = 0, pulseTimer = null, freshTimer = null;

function setConsole(open) {
  consOpen = open;
  document.getElementById("app").classList.toggle("console-open", open);
  document.documentElement.style.setProperty("--cons-h", open ? "170px" : "30px");
  // re-center the face to the final pane size once the track animation settles
  setTimeout(relayout, 320);
}
document.getElementById("conshead").onclick = e => {
  if (e.target.closest("#consgrip")) return;
  setConsole(!consOpen);
};

const severity = t =>
  /ACCEPTED|returned|registered|ok\b/.test(t) ? "ok" :
  /failed|rejected|WATCHDOG|error/i.test(t) ? "bad" :
  /PROPOSAL|queued|ATTENTION|REVERTED/.test(t) ? "warn" : "";

new EventSource("/sse").onmessage = e => {
  const div = document.createElement("div");
  div.className = "ln " + severity(e.data);
  div.textContent = e.data;
  cons.appendChild(div);
  while (cons.childNodes.length > 400) cons.removeChild(cons.firstChild);
  cons.scrollTop = cons.scrollHeight;

  consLines++;
  conscount.textContent = consLines + " lines";
  conslast.textContent = e.data;
  conslast.classList.add("fresh");
  clearTimeout(freshTimer); freshTimer = setTimeout(() => conslast.classList.remove("fresh"), 2000);
  conspulse.classList.add("live");
  clearTimeout(pulseTimer); pulseTimer = setTimeout(() => conspulse.classList.remove("live"), 1200);

  if (/PROPOSAL|ACCEPTED|REVERTED|rejected|limb registered/.test(e.data)) draw();
};

// after the editor slide animation settles, land the face on final center
document.getElementById("app").addEventListener("transitionend", ev => {
  if (ev.propertyName.startsWith("grid-template")) relayout();
});

setMode(mode);
loadTree();
draw();
refreshIcons();
</script>
